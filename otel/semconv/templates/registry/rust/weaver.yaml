whitespace_control:
  trim_blocks: true
  lstrip_blocks: true

comment_formats:
  rust:
    format: markdown
    prefix: "/// "
    trim: true
    remove_trailing_dots: true
    escape_square_brackets: true
default_comment_format: rust

params:
  schema_url: "https://trogon.ai/schemas/telemetry/0.1.0"
  exclude_root_namespace: []
  excluded_attributes: []

templates:
  - pattern: mod.rs.j2
    filter: "."
    application_mode: single
  - pattern: attribute.rs.j2
    filter: semconv_grouped_attributes($params)
    application_mode: single
  - pattern: metric.rs.j2
    filter: semconv_grouped_metrics($params)
    application_mode: single
