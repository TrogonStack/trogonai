listen: 0.0.0.0:4222
http_port: 8222

jetstream {
  store_dir: /tmp/nats/jetstream
  max_mem: 256MiB
  max_file: 1GiB
}

accounts {
  AUTH: {
    jetstream: enabled
    users: [
      {
        user: auth
        password: "<replace-with-callout-auth-password>"
        permissions: {
          publish: ">"
          subscribe: ">"
        }
      }
    ]
  }
  SMOKE: {
    jetstream: enabled
  }
  SYS: {}
}

system_account: SYS

authorization {
  timeout: 2s
  auth_callout {
    issuer: "<replace-with-nsc-bootstrap-issuer-public>"
    auth_users: [ auth ]
    account: AUTH
  }
}
