name: trogonai

services:
  nats:
    image: nats:2.14.2-alpine
    command:
      - "--jetstream"
      - "--store_dir=/data"
      - "--http_port=8222"
    volumes:
      - nats_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 3

  trogon-gateway:
    build:
      context: ../../../rsworkspace
      dockerfile: ../devops/docker/compose/services/trogon-gateway/Dockerfile
    command:
      - "--config"
      - "/etc/trogon-gateway/gateway.toml"
    env_file:
      - path: .env
        required: false
    environment:
      TROGON_GATEWAY_LOCAL_GITHUB_WEBHOOK_SECRET: "${TROGON_GATEWAY_LOCAL_GITHUB_WEBHOOK_SECRET:-local-dev-secret}"
      NATS_URL: "nats:4222"
      RUST_LOG: "${RUST_LOG:-info}"
      TROGON_GATEWAY_PORT: "${TROGON_GATEWAY_PORT:-8080}"
    volumes:
      - ./services/trogon-gateway/gateway.toml:/etc/trogon-gateway/gateway.toml:ro
    depends_on:
      nats:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${TROGON_GATEWAY_PORT:-8080}/-/liveness"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3

  # Telegram chat bridge: consumes the gateway's raw TELEGRAM stream and
  # drives the shared agent over acp-nats. Needs the gateway's Telegram
  # source enabled (provisions the stream) and an agent behind acp-nats.
  chat-bridge-telegram:
    build:
      context: ../../../rsworkspace
      dockerfile: ../devops/docker/compose/services/chat-bridge-telegram/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      CHAT_SEED_TELEGRAM_USERS: "${CHAT_SEED_TELEGRAM_USERS:-}"
      CHAT_PREFIX: "${CHAT_PREFIX:-prod}"
      TELEGRAM_INBOUND_STREAM: "${TELEGRAM_INBOUND_STREAM:-TELEGRAM}"
      ACP_PREFIX: "${ACP_PREFIX:-acp}"
      NATS_URL: "nats:4222"
      RUST_LOG: "${RUST_LOG:-info}"
    depends_on:
      nats:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - telegram

  # Backing store for the optional Postgres schedules read-model projection
  # (SCHEDULER_PROJECTION_BACKEND=postgres). The default NATS KV projection does
  # not need this service.
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-trogon}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-trogon}"
      POSTGRES_DB: "${POSTGRES_DB:-trogon_scheduler}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trogon} -d ${POSTGRES_DB:-trogon_scheduler}"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 5

  ngrok:
    image: ngrok/ngrok:3.39.6-alpine
    env_file:
      - path: .env
        required: false
    environment:
      GATEWAY_ADDR: "trogon-gateway:${TROGON_GATEWAY_PORT:-8080}"
    entrypoint:
      - /bin/sh
      - -c
      - |
        cat > /tmp/ngrok.yml <<EOF
        version: 3
        tunnels:
          gateway:
            addr: $${GATEWAY_ADDR}
            proto: http
        EOF
        exec ngrok start --all --config /tmp/ngrok.yml
    depends_on:
      trogon-gateway:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - dev

volumes:
  nats_data:
  postgres_data:
