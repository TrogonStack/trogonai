# Reference nats-server.conf for the agentgateway v0.1 substrate.
#
# Implements:
#   - JetStream enabled (required for streams/* and kv/* manifests).
#   - Decentralized operator-mode auth (resolver + system account).
#   - $SYS.REQ.USER.AUTH auth callout pointing at `a2a-auth-callout`.
#   - mTLS scaffolding (paths only — supply real material via Secrets).
#
# Replace every <…> placeholder before applying. See devops/nsc/README.md
# for operator + Account JWT bootstrap.

server_name: nats-trogon-0
listen: 0.0.0.0:4222
http: 0.0.0.0:8222
debug: false
trace: false

jetstream {
  store_dir: /data/jetstream
  max_memory_store: 1Gi
  max_file_store: 50Gi
}

# Decentralized operator-mode auth. The operator JWT is generated by
# `nsc add operator` (see devops/nsc/operator.template.env).
operator: <PASTE OPERATOR JWT>

# System account is referenced by SYS-only subjects ($SYS.>).
system_account: <SYS_ACCOUNT_PUBLIC_KEY>

# Full-resolver mode: server stores Account JWTs locally; `nsc push`
# uploads new JWTs via $SYS.REQ.CLAIMS.UPDATE.
resolver: {
  type: full
  dir: /data/jwt
  allow_delete: false
  interval: 2m
}

# Pre-load AUTH and SYS accounts before the resolver is consulted.
resolver_preload: {
  <SYS_ACCOUNT_PUBLIC_KEY>: "<SYS_ACCOUNT_JWT>"
  <AUTH_ACCOUNT_PUBLIC_KEY>: "<AUTH_ACCOUNT_JWT>"
}

# ---------------------------------------------------------------------
# Auth callout — every connection with no resolvable User JWT is routed
# through the `a2a-auth-callout` service for OIDC / mTLS / API-key
# minting (see rsworkspace/crates/a2a-auth-callout).
#
# Reference: https://docs.nats.io/running-a-nats-service/configuration/securing_nats/auth_callout
# ---------------------------------------------------------------------
authorization {
  timeout: 5
  auth_callout {
    issuer: <AUTH_ACCOUNT_PUBLIC_KEY>
    account: AUTH
    # XKey for end-to-end encryption of the callout request body.
    xkey: <AUTH_CALLOUT_XKEY_PUB>
    # Service identity(s) allowed to answer $SYS.REQ.USER.AUTH.
    auth_users: [
      <AUTH_CALLOUT_SERVICE_USER_PUBLIC_KEY>
    ]
  }
}

# ---------------------------------------------------------------------
# mTLS scaffold — switch to `verify_and_map: true` once Account User
# JWTs encode the client cert's SPIFFE ID.
# ---------------------------------------------------------------------
tls {
  cert_file: /etc/nats/tls/tls.crt
  key_file:  /etc/nats/tls/tls.key
  ca_file:   /etc/nats/tls/ca.crt
  verify:    true
  timeout:   5
}

# Cluster bootstrap (multi-replica deployments — match `replicas: 3`
# in streams/*.json and kv/*.json).
cluster {
  name: trogon
  listen: 0.0.0.0:6222
  routes = [
    nats://nats-0.nats.trogon.svc.cluster.local:6222
    nats://nats-1.nats.trogon.svc.cluster.local:6222
    nats://nats-2.nats.trogon.svc.cluster.local:6222
  ]
}
