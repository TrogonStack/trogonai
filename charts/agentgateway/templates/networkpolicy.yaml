{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agentgateway.fullname" . }}
  labels: {{- include "agentgateway.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "agentgateway.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- range .Values.networkPolicy.allowedIngressPodSelectors }}
        - podSelector:
            matchLabels: {{- toYaml . | nindent 14 }}
        {{- end }}
        {{- range .Values.networkPolicy.allowedIngressNamespaceSelectors }}
        - namespaceSelector:
            matchLabels: {{- toYaml . | nindent 14 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.probePort }}
  egress:
    # DNS.
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # NATS, SpiceDB, OTel — destinations are deployment-specific so we
    # only constrain by port. Tighten with namespaceSelectors per cluster.
    - ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.egress.natsPort }}
        - protocol: TCP
          port: {{ .Values.networkPolicy.egress.spicedbPort }}
        - protocol: TCP
          port: {{ .Values.networkPolicy.egress.otelPort }}
{{- end }}
