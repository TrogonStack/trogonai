[tools]
buf = "1.70.0"
go = "1.26.5"
"ubi:open-telemetry/weaver" = { version = "0.24.2", exe = "weaver" }
"cargo:cargo-dylint" = "6.0.1"
"cargo:dylint-link" = "6.0.1"
"cargo:protoc-gen-buffa" = "0.8.1"
"cargo:protoc-gen-buffa-packaging" = "0.8.1"
"cargo:cargo-component" = "0.21.1"
"cargo:cargo-deny" = "0.19.8"
"cargo:wasm-tools" = "1.250.0"
node = "26.3.0"
pnpm = "11.5.1"
python = "3.14.5"
uv = "0.11.18"
rust = { version = "1.96.0", profile = "minimal", components = "rustfmt,clippy,llvm-tools-preview" }

[tasks.dev]
description = "Start development environment"
run = "docker compose -f devops/docker/compose/compose.yml up -d"

[tasks.build]
description = "Build all"
depends = ["build:rust", "build:go", "build:docs", "build:web"]

[tasks."build:go"]
dir = "goworkspace"
run = "go build ./..."

[tasks."build:docs"]
dir = "docs"
run = "pnpm docs:build"

[tasks."build:web"]
dir = "tsworkspace"
run = "pnpm build"

[tasks."check:web"]
dir = "tsworkspace"
run = "pnpm fmt:check && pnpm lint && pnpm typecheck"

[tasks."build:rust"]
dir = "rsworkspace"
run = "cargo build"

[tasks.check]
description = "Check workspaces"
depends = ["check:rust", "check:go", "check:web"]

[tasks."test:go:race"]
dir = "goworkspace"
run = "go test -race ./..."

[tasks."check:rust"]
dir = "rsworkspace"
run = "cargo clippy --workspace && cargo fmt --check"

[tasks."proto:generate"]
description = "Generate Buffa Rust protobuf bindings from Buf modules"
run = "buf generate"
depends_post = ["proto:format:rust"]

[tasks."proto:format:rust"]
description = "Format generated Rust protobuf bindings"
dir = "rsworkspace"
run = "cargo fmt --all"

[tasks."proto:schedules-descriptor-set"]
description = "Generate FileDescriptorSet for the schedules decider test runner"
run = "mkdir -p rsworkspace/target/wasm32-unknown-unknown/release && buf build -o rsworkspace/target/wasm32-unknown-unknown/release/trogon_schedules_decider.binpb --as-file-descriptor-set --path proto/trogonai/scheduler/schedules"

[tasks."rust:wasm-target"]
description = "Ensure the wasm32-unknown-unknown Rust target is installed"
run = "rustup target add wasm32-unknown-unknown"

[tasks."rust:tls-policy"]
description = "Enforce ADR#0015: fail if native-tls/OpenSSL enter the Rust dependency graph"
dir = "rsworkspace"
run = "cargo deny check bans"

[tasks."artifacts:decider-test"]
description = "Build every wasm-components/* decider + the decider-test CLI"
depends = ["artifacts:wasm-components"]
run = "cd rsworkspace && cargo build -p trogon-decider-test --release"

[tasks."rsc"]
description = "Format and check all Rust code (fmt, clippy, all targets, all features)"
dir = "rsworkspace"
run = "cargo fmt && cargo clippy --all-targets --all-features"

[tasks."semconv:check"]
description = "Validate the otel/semconv/ Weaver registry and enforce naming policies"
run = "weaver registry check --registry otel/semconv/registry --policy otel/semconv/policies"

[tasks."semconv:generate"]
description = "Generate Rust semconv bindings from the Weaver registry"
run = "weaver registry generate --registry otel/semconv/registry --templates otel/semconv/templates rust rsworkspace/crates/platform/trogon-semconv/src/gen"
depends_post = ["semconv:format:rust"]

[tasks."semconv:format:rust"]
description = "Format generated Rust semconv bindings"
dir = "rsworkspace"
run = "cargo fmt -p trogon-semconv"
