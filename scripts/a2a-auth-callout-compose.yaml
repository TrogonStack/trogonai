# Minimal compose for a2a-auth-callout (build on host, run beside NATS).
#
#   cargo build --release -p a2a-auth-callout --manifest-path rsworkspace/Cargo.toml
#   cp "${A2A_NSC_DIR}/auth-callout-keys/auth-callout.env" ./auth-callout.env
#   docker compose -f scripts/a2a-auth-callout-compose.yaml up -d
#
# Runbook: docs/A2A_AUTH_CALLOUT_DEPLOYMENT.md

services:
  nats:
    image: nats:2.14-alpine
    command:
      - "-c"
      - "/etc/nats/a2a-auth-callout-nats-server.conf"
    volumes:
      - ./a2a-auth-callout-nats-server.conf:/etc/nats/a2a-auth-callout-nats-server.conf:ro
    ports:
      - "4222:4222"
      - "8222:8222"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  a2a-auth-callout:
    image: debian:bookworm-slim
    command: ["/opt/a2a/bin/a2a-auth-callout"]
    env_file:
      - path: ./auth-callout.env
        required: true
    environment:
      AUTH_CALLOUT_SIGNING_KEY_SOURCE: file
      AUTH_CALLOUT_SIGNING_KEY_PATH: /run/secrets/signing-key.current
    volumes:
      - ../rsworkspace/target/release/a2a-auth-callout:/opt/a2a/bin/a2a-auth-callout:ro
      - ./signing-key.current:/run/secrets/signing-key.current:ro
    depends_on:
      nats:
        condition: service_healthy
    restart: on-failure
