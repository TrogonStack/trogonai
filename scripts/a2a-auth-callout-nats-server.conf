# Reference centralized auth-callout layout (NATS 2.14.x).
# Substitute placeholders from scripts/a2a-auth-callout-bootstrap.sh output, then:
#   nats-server -c scripts/a2a-auth-callout-nats-server.conf
#
# Runbook: docs/A2A_AUTH_CALLOUT_DEPLOYMENT.md

listen: 127.0.0.1:4222
http_port: 8222

accounts {
  AUTH: {
    users: [
      { user: auth, password: "<replace-with-callout-auth-password>" }
    ]
  }
  APP: {}
  SYS: {}
}

system_account: SYS

authorization {
  timeout: 2s
  auth_callout {
    issuer: "<replace-with-nsc-bootstrap-issuer-public>"
    auth_users: [ auth ]
    account: AUTH
    # Uncomment after bootstrap with --enable-xkey:
    # xkey: "<replace-with-nsc-bootstrap-xkey-public>"
  }
}
