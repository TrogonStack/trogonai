edition = "2024";

package trogonai.gateway.credentials.v1;

import "trogonai/gateway/credentials/v1/types.proto";

message CredentialLifecycleEvent {
  oneof event {
    CredentialWriteRequested write_requested = 1;
    CredentialWriteFailed write_failed = 2;
    CredentialActivated activated = 3;
    CredentialRotationRequested rotation_requested = 4;
    CredentialRotationFailed rotation_failed = 5;
    CredentialRotated rotated = 6;
    CredentialRevoked revoked = 7;
  }
}

message CredentialWriteRequested {
  string credential_id = 1 [features.field_presence = LEGACY_REQUIRED];
  string owner_id = 2 [features.field_presence = LEGACY_REQUIRED];
  CredentialSource source = 3;
  CredentialKind kind = 4;
}

message CredentialWriteFailed {
  string credential_id = 1 [features.field_presence = LEGACY_REQUIRED];
  string reason = 2 [features.field_presence = LEGACY_REQUIRED];
}

message CredentialActivated {
  CredentialMetadata metadata = 1 [features.field_presence = LEGACY_REQUIRED];
}

message CredentialRotationRequested {
  CredentialRef credential_ref = 1 [features.field_presence = LEGACY_REQUIRED];
}

message CredentialRotationFailed {
  CredentialRef credential_ref = 1 [features.field_presence = LEGACY_REQUIRED];
  string reason = 2 [features.field_presence = LEGACY_REQUIRED];
}

message CredentialRotated {
  CredentialRef previous_credential_ref = 1 [features.field_presence = LEGACY_REQUIRED];
  CredentialMetadata metadata = 2 [features.field_presence = LEGACY_REQUIRED];
}

message CredentialRevoked {
  CredentialRef credential_ref = 1 [features.field_presence = LEGACY_REQUIRED];
}
