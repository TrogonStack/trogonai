edition = "2024";

package trogonai.gateway.credentials.v1;

import "trogonai/gateway/credentials/v1/credential_activated.proto";
import "trogonai/gateway/credentials/v1/credential_revoked.proto";
import "trogonai/gateway/credentials/v1/credential_rotated.proto";
import "trogonai/gateway/credentials/v1/credential_rotation_failed.proto";
import "trogonai/gateway/credentials/v1/credential_rotation_requested.proto";
import "trogonai/gateway/credentials/v1/credential_write_failed.proto";
import "trogonai/gateway/credentials/v1/credential_write_requested.proto";

message CredentialLifecycleEvent {
  oneof event {
    CredentialWriteRequested write_requested = 1;
    CredentialWriteFailed write_failed = 2;
    CredentialActivated activated = 3;
    CredentialRotationRequested rotation_requested = 4;
    CredentialRotationFailed rotation_failed = 5;
    CredentialRotated rotated = 6;
    CredentialRevoked revoked = 7;
  }
}
