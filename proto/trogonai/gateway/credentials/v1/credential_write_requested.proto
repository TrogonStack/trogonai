edition = "2024";

package trogonai.gateway.credentials.v1;

import "trogonai/gateway/credentials/v1/credential_ref.proto";

message CredentialWriteRequested {
  string credential_id = 1 [features.field_presence = LEGACY_REQUIRED];
  string owner_id = 2 [features.field_presence = LEGACY_REQUIRED];
  CredentialSource source = 3;
  CredentialKind kind = 4;
