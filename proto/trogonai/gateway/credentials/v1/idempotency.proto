edition = "2024";

package trogonai.gateway.credentials.v1;

import "trogonai/gateway/credentials/v1/commands.proto";

enum CredentialManagementIdempotencyStatus {
  CREDENTIAL_MANAGEMENT_IDEMPOTENCY_STATUS_UNSPECIFIED = 0;
  CREDENTIAL_MANAGEMENT_IDEMPOTENCY_STATUS_IN_PROGRESS = 1;
  CREDENTIAL_MANAGEMENT_IDEMPOTENCY_STATUS_COMPLETED = 2;
}

message CredentialManagementIdempotencyRecord {
  string fingerprint = 1 [features.field_presence = LEGACY_REQUIRED];
  CredentialManagementIdempotencyStatus status = 2;
  CredentialCommandResponse response = 3;
}
