edition = "2024";

package trogonai.gateway.credentials.v1;

enum CredentialSource {
  CREDENTIAL_SOURCE_UNSPECIFIED = 0;
  CREDENTIAL_SOURCE_DISCORD = 1;
  CREDENTIAL_SOURCE_GITHUB = 2;
  CREDENTIAL_SOURCE_GITLAB = 3;
  CREDENTIAL_SOURCE_INCIDENTIO = 4;
  CREDENTIAL_SOURCE_LINEAR = 5;
  CREDENTIAL_SOURCE_MICROSOFT_GRAPH = 6;
  CREDENTIAL_SOURCE_NOTION = 7;
  CREDENTIAL_SOURCE_SENTRY = 8;
  CREDENTIAL_SOURCE_SLACK = 9;
  CREDENTIAL_SOURCE_TELEGRAM = 10;
  CREDENTIAL_SOURCE_TWITTER = 11;
}

enum CredentialKind {
  CREDENTIAL_KIND_UNSPECIFIED = 0;
  CREDENTIAL_KIND_APP_TOKEN = 1;
  CREDENTIAL_KIND_BOT_TOKEN = 2;
  CREDENTIAL_KIND_CLIENT_SECRET = 3;
  CREDENTIAL_KIND_CLIENT_STATE = 4;
  CREDENTIAL_KIND_CONSUMER_SECRET = 5;
  CREDENTIAL_KIND_SIGNING_SECRET = 6;
  CREDENTIAL_KIND_SIGNING_TOKEN = 7;
  CREDENTIAL_KIND_VERIFICATION_TOKEN = 8;
  CREDENTIAL_KIND_WEBHOOK_SECRET = 9;
}

enum CredentialStatus {
  CREDENTIAL_STATUS_UNSPECIFIED = 0;
  CREDENTIAL_STATUS_PENDING = 1;
  CREDENTIAL_STATUS_ACTIVE = 2;
  CREDENTIAL_STATUS_PREVIOUS = 3;
  CREDENTIAL_STATUS_REVOKED = 4;
  CREDENTIAL_STATUS_EXPIRED = 5;
}

enum StorageBackend {
  STORAGE_BACKEND_UNSPECIFIED = 0;
  STORAGE_BACKEND_IN_MEMORY = 1;
  STORAGE_BACKEND_OPENBAO = 2;
  STORAGE_BACKEND_STATIC_CONFIG = 3;
}

message CredentialRef {
  string id = 1 [features.field_presence = LEGACY_REQUIRED];
  uint64 version = 2;
  string owner_id = 3 [features.field_presence = LEGACY_REQUIRED];
  CredentialSource source = 4;
  string scope_key = 5 [features.field_presence = LEGACY_REQUIRED];
  CredentialKind kind = 6;
}

message CredentialMetadata {
  CredentialRef reference = 1 [features.field_presence = LEGACY_REQUIRED];
  CredentialStatus status = 2;
  StorageBackend storage_backend = 3;
  string fingerprint = 4 [features.field_presence = LEGACY_REQUIRED];
}
