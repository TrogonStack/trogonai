edition = "2024";

package trogonai.gateway.credentials.state.v1;

import "trogonai/gateway/credentials/state/v1/credential_metadata.proto";
import "trogonai/gateway/credentials/state/v1/credential_ref.proto";

message CredentialStateSnapshot {
  oneof state {
    CredentialMissingState missing = 1;
    PendingCredentialWriteState pending_write = 2;
    ActiveCredentialState active = 3;
    FailedCredentialWriteState write_failed = 4;
    RotationPendingCredentialState rotation_pending = 5;
    RevokedCredentialState revoked = 6;
  }
}

message CredentialMissingState {}

message PendingCredentialWriteState {
  string credential_id = 1 [features.field_presence = LEGACY_REQUIRED];
  string owner_id = 2 [features.field_presence = LEGACY_REQUIRED];
  CredentialSource source = 3;
  CredentialKind kind = 4;
}

message ActiveCredentialState {
  CredentialMetadata metadata = 1 [features.field_presence = LEGACY_REQUIRED];
  repeated CredentialRef previous_versions = 2;
}

message FailedCredentialWriteState {
  string credential_id = 1 [features.field_presence = LEGACY_REQUIRED];
  string reason = 2 [features.field_presence = LEGACY_REQUIRED];
}

message RotationPendingCredentialState {
  ActiveCredentialState active = 1 [features.field_presence = LEGACY_REQUIRED];
}

message RevokedCredentialState {
  CredentialRef credential_ref = 1 [features.field_presence = LEGACY_REQUIRED];
}
