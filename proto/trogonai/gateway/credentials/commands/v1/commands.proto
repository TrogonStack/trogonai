edition = "2024";

package trogonai.gateway.credentials.commands.v1;

message PutCredentialSecretRequest {
  string owner_id = 1 [features.field_presence = LEGACY_REQUIRED];
  string secret = 2 [features.field_presence = LEGACY_REQUIRED];
}

message RotateCredentialSecretRequest {
  string owner_id = 1 [features.field_presence = LEGACY_REQUIRED];
  uint64 version = 2;
  string secret = 3 [features.field_presence = LEGACY_REQUIRED];
}

message RevokeCredentialSecretRequest {
  string owner_id = 1 [features.field_presence = LEGACY_REQUIRED];
  uint64 version = 2;
}

message CredentialCommandResponse {
  string state = 1 [features.field_presence = LEGACY_REQUIRED];
  uint64 stream_position = 2;
  CredentialRefResponse credential_ref = 3 [features.field_presence = LEGACY_REQUIRED];
}

message CredentialRefResponse {
  string id = 1 [features.field_presence = LEGACY_REQUIRED];
  uint64 version = 2;
  string owner_id = 3 [features.field_presence = LEGACY_REQUIRED];
  string source = 4 [features.field_presence = LEGACY_REQUIRED];
  string scope_key = 5 [features.field_presence = LEGACY_REQUIRED];
  string kind = 6 [features.field_presence = LEGACY_REQUIRED];
  string status = 7 [features.field_presence = LEGACY_REQUIRED];
}
