edition = "2024";

package trogonai.scheduler.schedules.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "google/type/datetime.proto";

// Schedule chooses exactly one scheduling strategy for a schedule definition.
message Schedule {
  oneof kind {
    // Delegated to native NATS as an @at schedule.
    At at = 1;
    // Delegated to native NATS as an @every schedule.
    Every every = 2;
    // Delegated to native NATS as a cron schedule expression.
    Cron cron = 3;
    // Expanded by the cron controller because NATS does not understand RRULE.
    RRule rrule = 4;
  }

  message At {
    // Single desired fire instant.
    google.protobuf.Timestamp at = 1 [features.field_presence = LEGACY_REQUIRED];
  }

  message Every {
    // Must be greater than zero; zero cannot be represented as a NATS interval.
    google.protobuf.Duration every = 1 [features.field_presence = LEGACY_REQUIRED];
  }

  message Cron {
    // NATS-compatible cron expression.
    string expr = 1 [features.field_presence = LEGACY_REQUIRED];
    // Optional NATS schedule timezone header value; empty omits the header.
    google.type.TimeZone timezone = 2 [features.field_presence = LEGACY_REQUIRED];
  }

  // RRule stores a Trogon-owned recurrence rule.
  //
  // The controller expands the rule into the next one-shot NATS @at schedule.
  // Consumers must not pass this value through as a native NATS schedule.
  message RRule {
    // Recurrence seed instant.
    google.protobuf.Timestamp dtstart = 1 [features.field_presence = LEGACY_REQUIRED];
    // Single RFC 5545 RRULE value; writers should omit the RRULE: prefix.
    string rrule = 2 [features.field_presence = LEGACY_REQUIRED];
    // IANA timezone used for wall-clock expansion; empty means UTC.
    google.type.TimeZone timezone = 3 [features.field_presence = LEGACY_REQUIRED];
    // Instants that are included even when they are not generated by rrule.
    repeated google.protobuf.Timestamp rdate = 4;
    // Instants that suppress matching generated or included occurrences.
    repeated google.protobuf.Timestamp exdate = 5;
  }
}
