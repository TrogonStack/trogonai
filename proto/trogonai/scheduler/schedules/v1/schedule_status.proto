edition = "2024";

package trogonai.scheduler.schedules.v1;

message ScheduleStatus {
  // A oneof gives each lifecycle state a place to grow without adding fields
  // that are invalid for other states.
  oneof kind {
    Scheduled scheduled = 1;
    Paused paused = 2;
  }

  // Scheduled means the desired state participates in future fire decisions.
  message Scheduled {}

  // Paused means the desired state keeps its definition without future fires.
  message Paused {}
}
