edition = "2024";

package trogonai.scheduler.schedules.state.v1;

import "google/protobuf/timestamp.proto";
import "trogonai/scheduler/schedules/v1/schedule.proto";

message State {
  StateValue state = 1;
  google.protobuf.Timestamp last_occurrence_at = 2;
  uint64 last_occurrence_sequence = 3;
  // Recurrence definition retained so the aggregate can plan the next occurrence.
  trogonai.scheduler.schedules.v1.Schedule schedule = 4;
  // Occurrence currently placed on a timer but not yet recorded.
  google.protobuf.Timestamp pending_occurrence_at = 5;
  // Recurrence exhausted: the schedule emitted ScheduleCompleted and must not be
  // re-armed until it is re-created.
  bool completed = 6;
}

enum StateValue {
  STATE_VALUE_UNSPECIFIED = 0;
  STATE_VALUE_MISSING = 1;
  STATE_VALUE_PRESENT_ENABLED = 2;
  STATE_VALUE_PRESENT_DISABLED = 3;
  STATE_VALUE_DELETED = 4;
}
