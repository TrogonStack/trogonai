edition = "2024";

package trogonai.agents.agents.v1;

import "trogonai/agents/agents/v1/agent.proto";

// Wire command to provision a new agent. Retries within one agent_id stream
// are classified as identical or conflicting definitions. Name uniqueness at
// the requested parent is an upstream precondition outside this decider.
message ProvisionAgent {
  string agent_id = 1 [features.field_presence = LEGACY_REQUIRED];
  string name = 2 [features.field_presence = LEGACY_REQUIRED];
  string parent = 3 [features.field_presence = LEGACY_REQUIRED];
  string owner = 4 [features.field_presence = LEGACY_REQUIRED];
  repeated Label labels = 5;
  // Permanent opaque metadata for this write and the initial Agent projection.
  map<string, string> annotations = 6;
  Charter charter = 7 [features.field_presence = LEGACY_REQUIRED];
  // Opaque identity requesting the provisioning operation.
  string principal = 8 [features.field_presence = LEGACY_REQUIRED];
  // SHA-256 digest of the full initial revision bundle, including content that
  // is stored outside this decider contract.
  string content_digest = 9 [features.field_presence = LEGACY_REQUIRED];
  // Delivery-scoped metadata propagated to emitted records, never projected.
  map<string, string> transient_annotations = 10;
}
