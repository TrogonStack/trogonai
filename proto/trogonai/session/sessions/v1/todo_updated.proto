edition = "2024";

package trogonai.session.sessions.v1;

// TodoUpdated records the agent's current task/plan list as a full snapshot on
// change, so the plan is a first-class domain fact rather than something a
// projection must parse out of a tool call's input. It is a commuting
// happened-fact (WRITE_PRECONDITION = Any, ADR#0035 facet 2).
message TodoUpdated {
  string session_id = 1 [features.field_presence = LEGACY_REQUIRED];
  // The complete todo list as of this update; readers replace, not merge.
  repeated TodoItem items = 2;
}

// TodoItem is one entry in the agent's task/plan list.
message TodoItem {
  string id = 1 [features.field_presence = LEGACY_REQUIRED];
  string content = 2 [features.field_presence = LEGACY_REQUIRED];
  TodoStatus status = 3 [features.field_presence = LEGACY_REQUIRED];
}

// TodoStatus is the state of a todo item.
enum TodoStatus {
  TODO_STATUS_UNSPECIFIED = 0;
  TODO_STATUS_PENDING = 1;
  TODO_STATUS_IN_PROGRESS = 2;
  TODO_STATUS_COMPLETED = 3;
}
