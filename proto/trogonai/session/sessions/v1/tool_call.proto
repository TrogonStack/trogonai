edition = "2024";

package trogonai.session.sessions.v1;

import "trogonai/session/sessions/v1/artifact.proto";

// ToolCallResult is the typed outcome of a completed tool call: either inline
// text or a claim-check reference to a stored artifact.
message ToolCallResult {
  oneof kind {
    TextToolResult text = 1;
    ArtifactRef artifact_ref = 2;
  }
}

// TextToolResult is an inline text tool result.
message TextToolResult {
  // Result text.
  string content = 1 [features.field_presence = LEGACY_REQUIRED];
  // True when content is a truncation of the full result.
  bool truncated = 2;
  // True when the tool ran to completion but its output represents an
  // application-level error (mirrors the MCP tool-result isError flag).
  bool is_error = 3;
}
