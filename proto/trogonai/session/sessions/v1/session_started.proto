edition = "2024";

package trogonai.session.sessions.v1;

import "trogonai/session/sessions/v1/execution_plan.proto";

// SessionStarted is the creation fact for a session's logical stream and stores
// the immutable StoredSessionExecutionPlan exactly once (ADR#0031 §6). It is the
// first event on a session subject; its producing command CreateSession appends
// under the NoStream precondition, making creation atomic and exactly-once
// (ADR#0035 facet 2).
message SessionStarted {
  string session_id = 1 [features.field_presence = LEGACY_REQUIRED];
  StoredSessionExecutionPlan execution_plan = 2 [features.field_presence = LEGACY_REQUIRED];
}
