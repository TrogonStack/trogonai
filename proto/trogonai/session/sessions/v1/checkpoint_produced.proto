edition = "2024";

package trogonai.session.sessions.v1;

import "trogonai/session/sessions/v1/checkpoint.proto";

// CheckpointProduced records an opaque durable checkpoint an execution attempt
// produced mid-run (ADR#0031 §3), retained as a reference and digest rather than
// inline bytes. A later attempt may restore it through
// ExecutionAttemptStarted.restored_checkpoint. It is a commuting happened-fact
// (WRITE_PRECONDITION = Any, ADR#0035 facet 2).
message CheckpointProduced {
  string session_id = 1 [features.field_presence = LEGACY_REQUIRED];
  string execution_attempt_id = 2 [features.field_presence = LEGACY_REQUIRED];
  Checkpoint checkpoint = 3 [features.field_presence = LEGACY_REQUIRED];
  // Physical JetStream stream sequence the checkpoint's state is current through,
  // so a "restore to sequence N" resolves to a checkpoint deterministically
  // rather than by guessing which checkpoint covers N (ADR#0013).
  uint64 at_sequence = 4 [features.field_presence = LEGACY_REQUIRED];
}
