edition = "2024";

package trogonai.session.sessions.v1;

// SystemNoticeRecorded records a system-originated notice surfaced during a
// session (info, warning, or error) that is not tied to a specific assistant
// turn. It is recorded so any model-visible system content and the user-visible
// transcript rebuild from the log alone (ADR#0035 facet 8). It is a commuting
// happened-fact (WRITE_PRECONDITION = Any, ADR#0035 facet 2).
message SystemNoticeRecorded {
  string session_id = 1 [features.field_presence = LEGACY_REQUIRED];
  NoticeLevel level = 2 [features.field_presence = LEGACY_REQUIRED];
  string text = 3 [features.field_presence = LEGACY_REQUIRED];
}

// NoticeLevel is the severity of a system notice.
enum NoticeLevel {
  NOTICE_LEVEL_UNSPECIFIED = 0;
  NOTICE_LEVEL_INFO = 1;
  NOTICE_LEVEL_WARNING = 2;
  NOTICE_LEVEL_ERROR = 3;
}
