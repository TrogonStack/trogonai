edition = "2024";

package trogonai.session.sessions.v1;

import "trogonai/session/sessions/v1/cascade_policy.proto";

// DelegationDispatched is the parent-side link fact recording a dispatched
// subagent, reusing the operation-ledger id to dedupe dispatch (ADR#0035
// facet 6). It is an invariant-bearing transition (WRITE_PRECONDITION = At),
// letting DispatchDelegation refuse to spawn under an already-terminal parent
// race-safely.
message DelegationDispatched {
  string session_id = 1 [features.field_presence = LEGACY_REQUIRED];
  string operation_id = 2 [features.field_presence = LEGACY_REQUIRED];
  string child_session_id = 3 [features.field_presence = LEGACY_REQUIRED];
  uint64 dispatched_at_sequence = 4 [features.field_presence = LEGACY_REQUIRED];
  CascadePolicy cascade_policy = 5 [features.field_presence = LEGACY_REQUIRED];
}
