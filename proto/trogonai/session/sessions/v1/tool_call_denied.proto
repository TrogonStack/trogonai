edition = "2024";

package trogonai.session.sessions.v1;

// ToolCallDenied records that a requested tool call was refused and never
// executed -- a human deny or a policy/hook block. Requesting a tool call is only
// the model's intent; this is the terminal branch when the call is not approved,
// so a denied call has no ToolCallStarted, no ToolCallCompleted, and reserves no
// operation in the ledger because nothing ran. It is a commuting happened-fact
// (WRITE_PRECONDITION = Any, ADR#0035 facet 2).
message ToolCallDenied {
  string session_id = 1 [features.field_presence = LEGACY_REQUIRED];
  string tool_call_id = 2 [features.field_presence = LEGACY_REQUIRED];
  string tool_execution_id = 3 [features.field_presence = LEGACY_REQUIRED];
  // Principal, policy, or hook that refused the call.
  string denied_by = 4 [features.field_presence = LEGACY_REQUIRED];
  // Human-readable reason for the refusal; empty when none.
  string reason = 5;
}
