edition = "2024";

package trogonai.session.sessions.v1;

import "trogonai/session/sessions/v1/digest.proto";

// StoredSessionExecutionPlan is the canonical SessionExecutionPlan bytes plus the
// digest computed over exactly those bytes (ADR#0031 §5, §6). SessionStarted
// stores it once per session; readers verify plan_digest against plan_bytes
// before decoding and never re-encode a decoded plan to recreate the digest.
message StoredSessionExecutionPlan {
  // Canonical, immutable SessionExecutionPlan encoding.
  bytes plan_bytes = 1 [features.field_presence = LEGACY_REQUIRED];
  // Digest over plan_bytes, stored beside the bytes it commits to.
  Digest plan_digest = 2 [features.field_presence = LEGACY_REQUIRED];
}
