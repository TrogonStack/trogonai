edition = "2024";

package trogonai.session.sessions.v1;

import "trogonai/session/sessions/v1/digest.proto";

// RestoredCheckpoint is the admitted checkpoint an attempt restored from
// (ADR#0031 §4).
message RestoredCheckpoint {
  string reference = 1 [features.field_presence = LEGACY_REQUIRED];
  string checkpoint_type = 2 [features.field_presence = LEGACY_REQUIRED];
  Digest digest = 3 [features.field_presence = LEGACY_REQUIRED];
  string implementation_version = 4 [features.field_presence = LEGACY_REQUIRED];
}

// ExecutionAttemptStarted is one attempt's start evidence under the immutable
// session execution plan; a restart creates a new attempt, never edits the
// prior one (ADR#0031 §4). It is a commuting happened-fact
// (WRITE_PRECONDITION = Any).
message ExecutionAttemptStarted {
  string session_id = 1 [features.field_presence = LEGACY_REQUIRED];
  string execution_attempt_id = 2 [features.field_presence = LEGACY_REQUIRED];
  Digest session_execution_plan_digest = 3 [features.field_presence = LEGACY_REQUIRED];
  uint64 attempt_number = 4 [features.field_presence = LEGACY_REQUIRED];
  string previous_attempt_id = 5;
  RestoredCheckpoint restored_checkpoint = 6;
  string resume_cursor = 7;
  string host_artifact_ref = 8 [features.field_presence = LEGACY_REQUIRED];
  Digest host_artifact_digest = 9 [features.field_presence = LEGACY_REQUIRED];
  string authenticated_remote_subject = 10;
  string isolation_placement = 11;
}
