edition = "2024";

package trogonai.session.sessions.v1;

import "trogonai/session/sessions/v1/digest.proto";

// OperationOutcomeRecorded reconciles a reserved operation's outcome,
// including an indeterminate OPERATION_OUTCOME_UNKNOWN that does not
// auto-repeat the side effect (ADR#0031 §4). The ledger deduplicates by
// operation id and digest; it is not exactly-once execution.
message OperationOutcomeRecorded {
  string session_id = 1 [features.field_presence = LEGACY_REQUIRED];
  string operation_id = 2 [features.field_presence = LEGACY_REQUIRED];
  OperationOutcome outcome = 3 [features.field_presence = LEGACY_REQUIRED];
  Digest response_digest = 4;
}

// OperationOutcome is how a reserved operation resolved.
enum OperationOutcome {
  OPERATION_OUTCOME_UNSPECIFIED = 0;
  OPERATION_OUTCOME_SUCCEEDED = 1;
  OPERATION_OUTCOME_FAILED = 2;
  OPERATION_OUTCOME_UNKNOWN = 3;
}
