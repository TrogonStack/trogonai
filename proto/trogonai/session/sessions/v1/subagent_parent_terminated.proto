edition = "2024";

package trogonai.session.sessions.v1;

// SubagentParentTerminated is recorded on the child subject by the
// reconciler when the parent reached a terminal state; emitted as one
// atomic batch with SessionCancelled (ADR#0035 facet 6). It is an
// invariant-bearing transition (WRITE_PRECONDITION = At).
message SubagentParentTerminated {
  string session_id = 1 [features.field_presence = LEGACY_REQUIRED];
  string parent_session_id = 2 [features.field_presence = LEGACY_REQUIRED];
}
