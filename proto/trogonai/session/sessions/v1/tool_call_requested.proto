edition = "2024";

package trogonai.session.sessions.v1;

// ToolCallRequested records that a tool call was requested, in arrival order.
// It is a commuting happened-fact (WRITE_PRECONDITION = Any, ADR#0035 facet 2).
message ToolCallRequested {
  string session_id = 1 [features.field_presence = LEGACY_REQUIRED];
  string tool_call_id = 2 [features.field_presence = LEGACY_REQUIRED];
  string tool_execution_id = 3 [features.field_presence = LEGACY_REQUIRED];
  string name = 4 [features.field_presence = LEGACY_REQUIRED];
  string input_json = 5 [features.field_presence = LEGACY_REQUIRED];
  string parent_tool_use_id = 6;
  // Operation-ledger id reserved for this call's side effect, joining it to
  // OperationReserved/OperationOutcomeRecorded (mirrors DelegationDispatched.operation_id).
  // Empty for a call that reserves no operation (e.g. a read-only tool).
  string operation_id = 7;
}
