edition = "2024";

package trogonai.session.sessions.v1;

// TokenUsage is the token accounting recorded for one completed assistant
// message; audit and budgeting input, never an identity or ordering input.
message TokenUsage {
  // Counters are intentionally not required: a provider may not report every
  // class (e.g. cache tokens), and edition-2024 presence distinguishes an unset
  // "not reported" counter from a reported 0.
  uint64 input_tokens = 1;
  uint64 output_tokens = 2;
  uint64 cache_creation_tokens = 3;
  uint64 cache_read_tokens = 4;
  // Monetary cost of this usage, priced at generation time. Recorded as a fact so
  // a deterministic cost projection folds recorded amounts and never re-reads a
  // drifting price catalog. Unset when cost is not tracked.
  Cost cost = 5;
}

// Cost is a fixed-point monetary amount priced when the usage was recorded.
message Cost {
  // Amount in millionths of one currency unit (micros); avoids floating point.
  int64 amount_micros = 1 [features.field_presence = LEGACY_REQUIRED];
  // ISO 4217 currency code, for example "USD".
  string currency_code = 2 [features.field_presence = LEGACY_REQUIRED];
  // Reference to the price catalog or rate version applied; empty when untracked.
  string rate_ref = 3;
}
