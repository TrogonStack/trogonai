edition = "2024";

package trogonai.session.sessions.v1;

import "trogonai/session/sessions/v1/digest.proto";

// ExecutionAttemptReady is admission proof that the attempt's implementation
// and effective configuration are running (ADR#0031 §4). It is a commuting
// happened-fact (WRITE_PRECONDITION = Any).
message ExecutionAttemptReady {
  string session_id = 1 [features.field_presence = LEGACY_REQUIRED];
  string execution_attempt_id = 2 [features.field_presence = LEGACY_REQUIRED];
  string ready_attestation_ref = 3 [features.field_presence = LEGACY_REQUIRED];
  Digest ready_attestation_digest = 4 [features.field_presence = LEGACY_REQUIRED];
}
