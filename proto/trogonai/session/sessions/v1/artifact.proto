edition = "2024";

package trogonai.session.sessions.v1;

import "google/protobuf/timestamp.proto";

// ArtifactRef is an inline claim-check to an artifact stored out of line: the
// stream carries the sha256 and a preview, never the bytes. It appears inside
// messages and tool results that reference an artifact.
message ArtifactRef {
  // Stable artifact id within the session.
  string artifact_id = 1 [features.field_presence = LEGACY_REQUIRED];
  // Content digest over the artifact bytes; the claim-check key (ADR#0035 facet 3).
  string sha256 = 2 [features.field_presence = LEGACY_REQUIRED];
  // Size of the referenced bytes.
  uint64 size_bytes = 3;
  // IANA media type of the referenced bytes.
  string mime = 4 [features.field_presence = LEGACY_REQUIRED];
  // Short human-readable preview; empty when none was produced.
  string preview = 5;
  // True when preview is a truncation of the full content.
  bool truncated = 6;
}

// ArtifactMetadata is the claim-check record carried by ArtifactRecorded: it
// captures how to locate and verify the out-of-line bytes without inlining them
// into the log.
message ArtifactMetadata {
  // Stable artifact id within the session.
  string artifact_id = 1 [features.field_presence = LEGACY_REQUIRED];
  // Content digest over the artifact bytes; the claim-check key.
  string sha256 = 2 [features.field_presence = LEGACY_REQUIRED];
  // Size of the stored bytes.
  uint64 size_bytes = 3;
  // IANA media type of the stored bytes.
  string mime = 4 [features.field_presence = LEGACY_REQUIRED];
  // External location the bytes were stored at (for example an Object Store key).
  string storage_ref = 5 [features.field_presence = LEGACY_REQUIRED];
  // Short human-readable preview; empty when none was produced.
  string preview = 6;
  // True when preview is a truncation of the full content.
  bool truncated = 7;
  // Wall-clock instant the artifact was stored.
  google.protobuf.Timestamp created_at = 8 [features.field_presence = LEGACY_REQUIRED];
  // Whether the bytes were durably stored or only a degraded external reference
  // was kept; recorded because a failed fetch leaves no other trace of the
  // difference between "we hold the bytes" and "we only had a broken reference".
  ArtifactSourceAvailability availability = 9 [features.field_presence = LEGACY_REQUIRED];
  // Original source URL for a fetched or degraded artifact; empty when none.
  string source_url = 10;
  // When the source bytes were fetched; unset when not applicable.
  google.protobuf.Timestamp fetched_at = 11;
  // Source transport encoding, for example "base64"; empty when none.
  string source_encoding = 12;
  // MIME as declared by the source before validation; empty when not declared.
  // The authoritative decoded type is mime above.
  string declared_mime = 13;
}

// ArtifactSourceAvailability distinguishes durably-stored bytes from a degraded
// external-reference-only artifact.
enum ArtifactSourceAvailability {
  ARTIFACT_SOURCE_AVAILABILITY_UNSPECIFIED = 0;
  // Bytes were fetched or decoded, validated, and stored.
  ARTIFACT_SOURCE_AVAILABILITY_STORED = 1;
  // Degraded: only an external reference (e.g. an un-fetchable URL) is kept.
  ARTIFACT_SOURCE_AVAILABILITY_EXTERNAL_REF = 2;
}
