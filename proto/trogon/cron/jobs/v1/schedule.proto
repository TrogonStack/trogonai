edition = "2024";

package trogon.cron.jobs.v1;

message JobSchedule {
  oneof kind {
    AtSchedule at = 1;
    EverySchedule every = 2;
    CronSchedule cron = 3;
  }
}

message AtSchedule {
  // RFC 3339 timestamp.
  string at = 1 [features.field_presence = LEGACY_REQUIRED];
}

message EverySchedule {
  uint64 every_sec = 1 [features.field_presence = LEGACY_REQUIRED];
}

message CronSchedule {
  string expr = 1 [features.field_presence = LEGACY_REQUIRED];
  string timezone = 2 [features.field_presence = LEGACY_REQUIRED];
}
