edition = "2024";

package trogon.cron.jobs.snapshot.v1;

message SnapshotState {
  SnapshotStateValue state = 1;
}

enum SnapshotStateValue {
  SNAPSHOT_STATE_VALUE_UNSPECIFIED = 0;
  SNAPSHOT_STATE_VALUE_MISSING = 1;
  SNAPSHOT_STATE_VALUE_PRESENT_ENABLED = 2;
  SNAPSHOT_STATE_VALUE_PRESENT_DISABLED = 3;
  SNAPSHOT_STATE_VALUE_DELETED = 4;
}
