version: '3.8'

services:
  # NATS Server with JetStream
  nats:
    image: nats:2.10-alpine
    container_name: trogonai-nats
    command:
      - "-js"
      - "-sd"
      - "/data"      # Persist JetStream streams/consumers/KV to the named volume
      - "-m"
      - "8222"
    ports:
      - "4222:4222"  # Client connections
      - "8222:8222"  # HTTP monitoring
      - "6222:6222"  # Cluster connections
    volumes:
      - nats-data:/data
    networks:
      - trogonai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Telegram chat bridge: gateway raw updates -> shared ACP agent -> Telegram.
  # Requires the trogon-gateway Telegram source (provisions the TELEGRAM
  # stream) and an agent behind acp-nats.
  chat-bridge-telegram:
    build:
      context: ./rsworkspace
      dockerfile: ../Dockerfile.chat-bridge-telegram
    container_name: trogonai-chat-bridge-telegram
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - NATS_URL=nats://nats:4222
      - CHAT_PREFIX=${CHAT_PREFIX:-prod}
      - TELEGRAM_INBOUND_STREAM=${TELEGRAM_INBOUND_STREAM:-TELEGRAM}
      - ACP_PREFIX=${ACP_PREFIX:-acp}
      - CHAT_SEED_TELEGRAM_USERS=${CHAT_SEED_TELEGRAM_USERS:-}
      - RUST_LOG=${RUST_LOG:-chat_bridge_telegram=info,info}
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - trogonai-network
    restart: unless-stopped

  # NATS Monitoring (optional)
  nats-surveyor:
    image: natsio/nats-surveyor:latest
    container_name: trogonai-nats-surveyor
    command:
      - "-s"
      - "http://nats:8222"
      - "-p"
      - "7777"
    ports:
      - "7777:7777"
    depends_on:
      - nats
    networks:
      - trogonai-network
    restart: unless-stopped
    profiles:
      - monitoring

networks:
  trogonai-network:
    driver: bridge

volumes:
  nats-data:
    driver: local
