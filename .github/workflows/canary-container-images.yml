name: cd / canary container images

on:
  push:
    branches:
      - main

concurrency:
  group: canary-container-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - trogon-gateway
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Resolve service config
        id: service_config
        uses: ./.github/actions/resolve-service-config
        with:
          service: ${{ matrix.service }}
          config-file: .github/canary-container-services.json

      - name: Resolve image name
        id: image
        env:
          IMAGE_OWNER: ${{ github.repository_owner }}
        run: |
          echo "name=ghcr.io/${IMAGE_OWNER,,}/${{ steps.service_config.outputs.image }}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push canary image
        id: build_image
        uses: docker/build-push-action@v7
        with:
          context: ${{ steps.service_config.outputs.context }}
          file: ${{ steps.service_config.outputs.dockerfile }}
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:canary
            ${{ steps.image.outputs.name }}:sha-${{ steps.image.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.32.0
        with:
          image-ref: ${{ steps.image.outputs.name }}:canary
          scanners: vuln
          format: table
          output: trivy-results.txt
          ignore-unfixed: true
          exit-code: 0

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.20.6
        with:
          image: ${{ steps.image.outputs.name }}:canary
          artifact-name: sbom-${{ matrix.service }}-spdx
          format: spdx-json

      - name: Document image security audit
        shell: bash
        run: |
          {
            echo "## Image security audit: \`${{ matrix.service }}\`"
            echo ""
            echo "- Image: \`${{ steps.image.outputs.name }}:canary\`"
            echo "- Runtime base: \`debian:bookworm-20260518-slim\`"
            echo "- SBOM artifact: \`sbom-${{ matrix.service }}-spdx\` (SPDX JSON)"
            echo ""
            echo "### Vulnerability scan (Trivy, image packages)"
            echo '```text'
            cat trivy-results.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
