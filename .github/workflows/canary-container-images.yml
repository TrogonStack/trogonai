name: cd / canary container images

on:
  push:
    branches:
      - main

concurrency:
  group: canary-container-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - trogon-gateway
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Resolve image name
        id: image
        env:
          IMAGE_OWNER: ${{ github.repository_owner }}
        run: |
          echo "name=ghcr.io/${IMAGE_OWNER,,}/${{ matrix.service }}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Resolve service config
        id: service_config
        uses: ./.github/actions/resolve-service-config
        with:
          service: ${{ matrix.service }}
          config-file: .github/canary-container-services.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push canary image
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.service_config.outputs.context }}
          file: ${{ steps.service_config.outputs.dockerfile }}
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:canary
            ${{ steps.image.outputs.name }}:sha-${{ steps.image.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
