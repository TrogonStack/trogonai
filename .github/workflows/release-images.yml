name: cd / release container images

on:
  push:
    tags:
      - "*-v*.*.*"  # release-please cargo-workspace tags, e.g. trogon-mcp-gateway-v0.1.0

concurrency:
  group: release-images-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write  # for cosign keyless signing

jobs:
  build-and-publish:
    name: Build, push, sign (${{ matrix.bin }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bin:
          - a2a-bridge
          - a2a-gateway
          - a2a-auth-callout
          - acp-nats-stdio
          - agctl
          - mcp-nats-server
          - mcp-pack
          - trogon-agent-registry
          - trogon-agent-registry-controller
          - trogon-gateway-ctl
          - trogon-gateway-k8s
          - trogon-jwks-publisher
          - trogon-mcp-gateway
          - trogon-sts
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Resolve image + tag
        id: resolve
        env:
          IMAGE_OWNER: ${{ github.repository_owner }}
          BIN: ${{ matrix.bin }}
          REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          owner_lc="${IMAGE_OWNER,,}"
          echo "image=ghcr.io/${owner_lc}/${BIN}" >> "$GITHUB_OUTPUT"
          # The release-please tag is "<crate>-v<version>". Skip if this
          # tag is not for the binary we're building in this matrix slot.
          expected_prefix="${BIN}-v"
          if [[ "${REF}" != ${expected_prefix}* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping ${BIN}: tag ${REF} does not match ${expected_prefix}*"
          else
            version="${REF#${expected_prefix}}"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "version=${version}" >> "$GITHUB_OUTPUT"
            echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.resolve.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: steps.resolve.outputs.skip == 'false'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        if: steps.resolve.outputs.skip == 'false'
        uses: sigstore/cosign-installer@v3

      - name: Build and push image
        if: steps.resolve.outputs.skip == 'false'
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: devops/docker/Dockerfile
          build-args: |
            BIN=${{ matrix.bin }}
          push: true
          tags: |
            ${{ steps.resolve.outputs.image }}:${{ steps.resolve.outputs.version }}
            ${{ steps.resolve.outputs.image }}:sha-${{ steps.resolve.outputs.short_sha }}
            ${{ steps.resolve.outputs.image }}:latest
          cache-from: type=gha,scope=${{ matrix.bin }}
          cache-to: type=gha,scope=${{ matrix.bin }},mode=max

      - name: Sign image (cosign keyless)
        if: steps.resolve.outputs.skip == 'false'
        env:
          COSIGN_EXPERIMENTAL: "true"
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ steps.resolve.outputs.image }}
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"
