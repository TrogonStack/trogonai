name: CI Rust

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-rust-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.3.1

      - uses: jdx/mise-action@v3.6.1

      - name: Install Rust components
        run: rustup component add rustfmt clippy llvm-tools-preview

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2.8.2
        with:
          workspaces: rsworkspace -> target

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Check formatting
        run: cargo fmt --all -- --check
        working-directory: rsworkspace

      - name: Test repo Rust policy lints
        run: |
          dylint_toolchain="$(python - <<'PY'
          import tomllib

          with open("rust-toolchain.toml", "rb") as toolchain_file:
              print(tomllib.load(toolchain_file)["toolchain"]["channel"])
          PY
          )"
          rustup run "$dylint_toolchain" cargo test
        working-directory: rsworkspace/dylints/trogon_lints

      - name: Run repo Rust policy lints
        run: env -u RUSTUP_TOOLCHAIN DYLINT_RUSTFLAGS='-Derror-string-comparison' cargo dylint --path dylints/trogon_lints --workspace --no-deps -- --all-features
        working-directory: rsworkspace

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: rsworkspace

      - name: Build
        run: cargo build --release
        working-directory: rsworkspace

      - name: Run tests with coverage
        run: cargo llvm-cov --all-features --workspace
        working-directory: rsworkspace
