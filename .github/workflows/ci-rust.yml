name: CI Rust

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches: [main]
    paths:
      - 'rsworkspace/**'
      - 'LICENSE'
      - '.mise.toml'
      - 'rust-toolchain.toml'
      - '.config/mise/tasks/**'
      - '.github/actions/enforce-cargo-license/**'
      - '.github/actions/setup-rust/**'
      - '.github/workflows/ci-rust.yml'

concurrency:
  group: ci-rust-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Source-built mise tools (dylint-link, cargo-component, ...) fetch crates from
  # crates.io during install; raise retry tolerance for spurious network errors.
  CARGO_NET_RETRY: '10'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          dylint-toolchain-dir: rsworkspace/dylints/trogon_lints

      - name: Enforce crate licenses
        uses: ./.github/actions/enforce-cargo-license

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rsworkspace -> target
          save-if: true
          cache-on-failure: true
          cache-workspace-crates: true

      - name: Check formatting
        run: cargo fmt --all -- --check
        working-directory: rsworkspace

      - name: Test repo Rust policy lints
        run: |
          dylint_toolchain="$(python - <<'PY'
          import tomllib

          with open("rust-toolchain.toml", "rb") as toolchain_file:
              print(tomllib.load(toolchain_file)["toolchain"]["channel"])
          PY
          )"
          rustup run "$dylint_toolchain" cargo test
        working-directory: rsworkspace/dylints/trogon_lints

      - name: Run repo Rust policy lints
        run: env -u RUSTUP_TOOLCHAIN cargo dylint --path dylints/trogon_lints --workspace --no-deps -- --all-features --all-targets
        working-directory: rsworkspace

      - name: Run clippy
        run: cargo clippy --all-targets --all-features
        working-directory: rsworkspace

  test:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rsworkspace -> target
          save-if: true
          cache-on-failure: true
          cache-workspace-crates: true

      - name: Install coverage tools
        uses: taiki-e/install-action@25435dc8dd3baed7417e0c96d3fe89013a5b2e09 # v2.81.3
        with:
          tool: cargo-llvm-cov,nextest

      - name: Build decider components for sim fixtures
        run: |
          cargo component build -p trogon-light-decider --target wasm32-unknown-unknown --release
          cargo component build -p trogon-schedules-decider --target wasm32-unknown-unknown --release
          cargo component build -p trogon-decider-spike --target wasm32-unknown-unknown --release
        working-directory: rsworkspace

      - name: Run documentation tests
        run: cargo test --doc
        working-directory: rsworkspace

      - name: Run tests with coverage
        run: cargo cov nextest --cobertura --output-path coverage.xml
        working-directory: rsworkspace

      - name: Coverage report and gate
        # TODO: Add a fork-safe read-only coverage comparison path; this action writes to
        # _xml_coverage_reports, but fork PR tokens cannot push to the base repo.
        uses: insightsengineering/coverage-action@f3f8cdb7a8863fb60236982ac44b9ae63c768cd4 # v3.0.3
        with:
          path: rsworkspace/coverage.xml
          threshold: 95
          fail: true
          publish: true
          diff: true
          diff-branch: main
          diff-storage: _xml_coverage_reports
          uncovered-statements-increase-failure: ${{ !contains(github.event.pull_request.labels.*.name, 'rust:coverage-baseline-reset') }}
          new-uncovered-statements-failure: ${{ !contains(github.event.pull_request.labels.*.name, 'rust:coverage-baseline-reset') }}
          coverage-rate-reduction-failure: ${{ !contains(github.event.pull_request.labels.*.name, 'rust:coverage-baseline-reset') }}
          togglable-report: true

  build:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rsworkspace -> target
          save-if: true
          cache-on-failure: true
          cache-workspace-crates: true

      - name: Build release
        run: cargo build --release --workspace --exclude trogon-light-decider --exclude trogon-schedules-decider --exclude trogon-decider-spike
        working-directory: rsworkspace

  wasm-decider:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Install cargo-component and wasm-tools
        run: |
          cargo install cargo-component --locked --version 0.21.1
          cargo install wasm-tools --locked --version 1.250.0

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rsworkspace -> target
          save-if: always

      - name: Build Light decider component
        run: cargo component build -p trogon-light-decider --target wasm32-unknown-unknown --release
        working-directory: rsworkspace

      - name: Build schedules decider component
        run: cargo component build -p trogon-schedules-decider --target wasm32-unknown-unknown --release
        working-directory: rsworkspace

      - name: Assert zero imports and validate
        run: |
          for WASM in rsworkspace/target/wasm32-unknown-unknown/release/trogon_light_decider.wasm rsworkspace/target/wasm32-unknown-unknown/release/trogon_schedules_decider.wasm; do
            wasm-tools component wit "$WASM" | tee /tmp/wit.txt
            if grep -E '^[[:space:]]*import ' /tmp/wit.txt; then
              echo "component declares imports: $WASM"
              exit 1
            fi
            wasm-tools validate "$WASM"
          done

      - name: Run decider-test suites
        run: |
          cd rsworkspace
          cargo test -p trogon-decider-sim --test light --test schedules --features test-support
          cargo test -p trogon-decider-guest-macros --test compile_fail
          cargo build -p trogon-decider-test --release
          ./target/release/decider-test target/wasm32-unknown-unknown/release/trogon_light_decider.wasm cli/trogon-decider-test/light.yaml
          ./target/release/decider-test target/wasm32-unknown-unknown/release/trogon_schedules_decider.wasm cli/trogon-decider-test/schedules.yaml
