name: CI Rust

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches: [main]
    paths:
      - 'rsworkspace/**'
      - '.mise.toml'
      - '.config/mise/tasks/**'
      - '.github/workflows/ci-rust.yml'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rsworkspace -> target
          save-if: always

      - name: Check formatting
        run: cargo fmt --all -- --check
        working-directory: rsworkspace

      - name: Run clippy
        run: cargo clippy --all-targets --all-features
        working-directory: rsworkspace

  test:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Install Rust components
        run: rustup component add llvm-tools-preview

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rsworkspace -> target
          save-if: always

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@25435dc8dd3baed7417e0c96d3fe89013a5b2e09 # v2.81.3
        with:
          tool: cargo-llvm-cov

      - name: Run tests with coverage
        run: cargo cov --cobertura --output-path coverage.xml
        working-directory: rsworkspace

      - name: Coverage report and gate
        # TODO: Add a fork-safe read-only coverage comparison path; this action writes to
        # _xml_coverage_reports, but fork PR tokens cannot push to the base repo.
        uses: insightsengineering/coverage-action@f3f8cdb7a8863fb60236982ac44b9ae63c768cd4 # v3.0.3
        with:
          path: rsworkspace/coverage.xml
          threshold: 95
          fail: true
          publish: true
          diff: true
          diff-branch: main
          diff-storage: _xml_coverage_reports
          uncovered-statements-increase-failure: ${{ !contains(github.event.pull_request.labels.*.name, 'rust:coverage-baseline-reset') }}
          new-uncovered-statements-failure: ${{ !contains(github.event.pull_request.labels.*.name, 'rust:coverage-baseline-reset') }}
          coverage-rate-reduction-failure: ${{ !contains(github.event.pull_request.labels.*.name, 'rust:coverage-baseline-reset') }}
          togglable-report: true

  build:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rsworkspace -> target
          save-if: always

      - name: Build release
        run: cargo build --release
        working-directory: rsworkspace
