name: CI ADR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # ADR#NNNN references live in markdown across the whole repo (crate READMEs,
    # skills, architecture and research docs), not only under docs/adr, so this
    # guard is intentionally repo-wide rather than scoped to one workspace dir.
    paths:
      - "**/*.md"
      - ".config/mise/tasks/github-actions/lint-adr-refs"
      - ".github/workflows/ci-adr.yml"

concurrency:
  group: ci-adr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-adr-refs:
    name: Validate ADR References
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: false

      - name: Lint ADR references
        run: mise run --skip-tools github-actions:lint-adr-refs
