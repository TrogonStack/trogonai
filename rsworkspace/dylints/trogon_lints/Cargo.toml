[package]
name = "trogon_lints"
version = "0.1.0"
description = "Repository-owned Rust policy lints for Trogon"
edition = "2024"
publish = false

[lib]
crate-type = ["cdylib"]

[lints.rust]
warnings = "deny"
unexpected_cfgs = { level = "deny", check-cfg = ['cfg(coverage)'] }

[lints.clippy]
all = "deny"
expect_used = "deny"
panic = "deny"
unwrap_used = "deny"

[dependencies]
clippy_utils = { git = "https://github.com/rust-lang/rust-clippy", rev = "f6d310692116e9a527ce6d0b3526c965d9c5d7b9" }
dylint_linting = "6.0.1"

[dev-dependencies]
dylint_testing = "6.0.1"
opentelemetry = "0.31"
tracing = "0.1"

[package.metadata.rust-analyzer]
rustc_private = true

[workspace]
