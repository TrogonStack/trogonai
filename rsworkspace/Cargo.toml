[workspace]
resolver = "2"
members = ["crates/*"]

[workspace.lints.rust]
warnings = "deny"
unexpected_cfgs = { level = "deny", check-cfg = ['cfg(coverage)'] }

[workspace.lints.clippy]
all = "deny"

[workspace.dependencies]
# Internal crates
acp-nats = { path = "crates/acp-nats" }
acp-telemetry = { path = "crates/acp-telemetry" }
trogon-nats = { path = "crates/trogon-nats" }
trogon-service-config = { path = "crates/trogon-service-config" }
trogon-source-discord = { path = "crates/trogon-source-discord" }
trogon-source-github = { path = "crates/trogon-source-github" }
trogon-source-gitlab = { path = "crates/trogon-source-gitlab" }
trogon-source-incidentio = { path = "crates/trogon-source-incidentio" }
trogon-source-linear = { path = "crates/trogon-source-linear" }
trogon-source-notion = { path = "crates/trogon-source-notion" }
trogon-source-sentry = { path = "crates/trogon-source-sentry" }
trogon-source-slack = { path = "crates/trogon-source-slack" }
trogon-source-telegram = { path = "crates/trogon-source-telegram" }
trogon-source-twitter = { path = "crates/trogon-source-twitter" }
trogon-std = { path = "crates/trogon-std" }
trogon-actor = { path = "crates/trogon-actor" }
trogon-router = { path = "crates/trogon-router" }
trogon-registry = { path = "crates/trogon-registry" }
trogon-transcript = { path = "crates/trogon-transcript" }

# ACP
agent-client-protocol = { version = "=0.10.4", features = ["unstable_logout"] }

# Async runtime & networking
async-compat = "=0.2.5"
async-nats = { version = "=0.47.0", default-features = false }
async-trait = "=0.1.89"
reqwest = { version = "=0.12.15", default-features = false, features = ["json", "rustls-tls"] }
axum = { version = "=0.8.8", features = ["ws"] }
bytes = "=1.11.1"
futures = "=0.3.32"
futures-util = "=0.3.32"
tokio = "=1.50.0"
tokio-tungstenite = "=0.29.0"
tower-http = { version = "=0.6.8", features = ["trace"] }

# Serialization
confique = { version = "=0.4.0", features = ["toml"] }
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.149"

# CLI
clap = { version = "=4.6.0", features = ["derive"] }

# Observability
opentelemetry = "=0.31.0"
opentelemetry-appender-tracing = "=0.31.1"
opentelemetry-otlp = "=0.31.1"
opentelemetry-semantic-conventions = { version = "=0.31.0", features = ["semconv_experimental"] }
opentelemetry_sdk = "=0.31.0"
tracing = "=0.1.44"
tracing-opentelemetry = "=0.32.1"
tracing-subscriber = "=0.3.23"

# Discord
twilight-gateway = { version = "=0.17.1", default-features = false, features = ["rustls-native-roots"] }
twilight-model = "=0.17.1"

# Misc
tempfile = "=3.19.1"
uuid = { version = "=1.23.0", features = ["v4", "v7"] }

[profile.release]
lto = "thin"
strip = "symbols"
codegen-units = 1
# Note: panic = "abort" removed because Cargo doesn't support per-package panic overrides.
# Bridge crates use catch_unwind for panic isolation, which requires panic = "unwind".
# All workspace crates will use unwinding in release builds for this reason.
