[workspace]
resolver = "2"
members = ["crates/*"]

[workspace.lints.rust]
warnings = "deny"
unexpected_cfgs = { level = "deny", check-cfg = ['cfg(coverage)'] }

[workspace.lints.clippy]
all = "deny"

[workspace.dependencies]
# Internal crates
acp-nats = { path = "crates/acp-nats" }
acp-telemetry = { path = "crates/acp-telemetry" }
trogon-nats = { path = "crates/trogon-nats" }
trogon-std = { path = "crates/trogon-std" }
telegram-types = { path = "crates/telegram-types" }
telegram-nats = { path = "crates/telegram-nats" }

# ACP
agent-client-protocol = { version = "=0.10.4", features = ["unstable_logout"] }

# Async runtime & networking
async-compat = "=0.2.5"
async-nats = { version = "=0.47.0", default-features = false }
async-trait = "=0.1.89"
axum = { version = "=0.8.8", features = ["ws"] }
bytes = "=1.11.1"
futures = "=0.3.32"
futures-util = "=0.3.32"
tokio = "=1.50.0"
tokio-tungstenite = "=0.29.0"
tower-http = { version = "=0.6.8", features = ["trace"] }

# Telegram
teloxide = { version = "=0.14.1", features = ["macros", "webhooks-axum"] }
dptree = "=0.3.0"

# Serialization
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.149"
toml = "=0.8.23"

# CLI
clap = { version = "=4.6.0", features = ["derive"] }

# Observability
opentelemetry = "=0.31.0"
opentelemetry-appender-tracing = "=0.31.1"
opentelemetry-otlp = "=0.31.1"
opentelemetry_sdk = "=0.31.0"
tracing = "=0.1.44"
tracing-opentelemetry = "=0.32.1"
tracing-subscriber = "=0.3.23"

# Error handling
anyhow = "=1.0.101"
thiserror = "=2.0.18"

# HTTP client
reqwest = { version = "=0.12.28", default-features = false }

# Time & IDs
chrono = { version = "=0.4.43", features = ["serde"] }
uuid = { version = "=1.23.0", features = ["v4", "v7"] }

# Misc
url = "=2.5.8"
mime = "=0.3.17"

[profile.release]
lto = "thin"
strip = "symbols"
codegen-units = 1
# Note: panic = "abort" removed because Cargo doesn't support per-package panic overrides.
# Bridge crates use catch_unwind for panic isolation, which requires panic = "unwind".
# All workspace crates will use unwinding in release builds for this reason.
