[package]
name = "trogon-tools"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
reqwest    = { version = "0.12", default-features = false, features = ["rustls-tls", "json", "stream"] }
serde      = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio      = { version = "1", features = ["full"] }
globset    = "0.4"
html2text  = "0.12"
ignore     = "0.4"

[dev-dependencies]
httpmock = "0.7"
tempfile = "3"
