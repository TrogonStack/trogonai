[package]
name = "trogonai-capabilities"
version = "0.1.0"
edition = "2024"
publish = false

[lints]
workspace = true

[dependencies]
base64 = "0.22"
buffa = "=0.7.0"
buffa-types = "=0.7.0"
opentelemetry = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
time = { workspace = true }
thiserror = "2"
tracing = { workspace = true }
trogon-registry = { workspace = true }
trogonai-session-contracts = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
trogon-registry = { workspace = true, features = ["test-support"] }

[features]
default = []
test-support = []
