[package]
name = "trogon-decider-wit"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
publish = false
description = "WIT contract and bindings for Trogon WASM deciders"

[features]
default = []
guest = ["dep:wit-bindgen"]
host = ["dep:wasmtime", "dep:anyhow"]

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true, optional = true }
wasmtime = { version = "=36.0.8", default-features = false, features = ["component-model", "runtime", "cranelift"], optional = true }
wit-bindgen = { version = "=0.41.0", optional = true }

[dev-dependencies]
trybuild = "1"

[package.metadata.component]
package = "trogon:decider"
