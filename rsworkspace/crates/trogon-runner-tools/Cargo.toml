[package]
name = "trogon-runner-tools"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"

[lints]
workspace = true

[dependencies]
agent-client-protocol = { version = "0.10.2", features = [
    "unstable_auth_methods",
    "unstable_boolean_config",
    "unstable_cancel_request",
    "unstable_elicitation",
    "unstable_message_id",
    "unstable_session_close",
    "unstable_session_fork",
    "unstable_session_model",
    "unstable_session_resume",
    "unstable_session_usage",
] }
anyhow      = "1"
reqwest     = { workspace = true }
async-nats  = { workspace = true, features = ["jetstream", "kv"] }
async-trait = "0.1"
futures-util = { version = "0.3", default-features = false, features = ["std"] }
globset     = "0.4"
serde       = { version = "1.0", features = ["derive"] }
serde_json  = "1.0"
tokio       = { version = "1", features = ["full"] }
tracing     = "0.1"
uuid        = { workspace = true }

acp-nats     = { workspace = true }
trogon-std   = { workspace = true }
trogon-mcp   = { path = "../trogon-mcp" }
trogon-nats  = { workspace = true }
trogon-tools = { path = "../trogon-tools" }

[dev-dependencies]
agent-client-protocol  = { workspace = true }
async-nats             = { workspace = true }
bytes                  = { workspace = true }
futures-util           = { version = "0.3", default-features = false, features = ["std"] }
httpmock               = "0.7"
opentelemetry          = { workspace = true }
serde_json             = "1.0"
tempfile               = { workspace = true }
testcontainers-modules = { workspace = true }
tokio                  = { version = "1", features = ["full"] }
trogon-nats            = { workspace = true, features = ["test-support"] }
trogon-std             = { workspace = true, features = ["test-support"] }

[features]
test-helpers = []

[[test]]
name = "wasm_bash_integration"
required-features = ["test-helpers"]

[[test]]
name = "worktree_tests"

[[test]]
name = "spawn_session_tests"
