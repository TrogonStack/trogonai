[package]
name = "trogon-secret-proxy"
version = "0.1.0"
edition = "2024"

[dependencies]
async-nats = { workspace = true }
axum = { workspace = true }
bytes = { workspace = true }
futures-util = { workspace = true }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
trogon-nats = { workspace = true }
trogon-std = { workspace = true }
trogon-vault = { path = "../trogon-vault", features = ["hashicorp-vault"] }
uuid = { workspace = true }

[dev-dependencies]
httpmock = "0.7"
testcontainers-modules = { version = "0.8", features = ["nats"] }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
tower = { version = "0.5", features = ["util"] }
trogon-nats = { workspace = true, features = ["test-support"] }

[[bin]]
name = "proxy"
path = "src/bin/proxy.rs"

[[bin]]
name = "worker"
path = "src/bin/worker.rs"
