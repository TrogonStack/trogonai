[package]
name = "trogon-mcp"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
reqwest  = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
serde    = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio    = { version = "1", features = ["full"] }
tracing  = "0.1"

[dev-dependencies]
httpmock   = "0.7"
