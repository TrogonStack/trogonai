[package]
name = "trogon-xai-runner"
version = "0.0.1"
edition = "2024"

[features]
test-helpers = []

[[test]]
name = "xai_integration"
required-features = ["test-helpers"]

[[test]]
name = "nats_e2e"
required-features = ["test-helpers"]

[lints]
workspace = true

[dependencies]
acp-nats        = { workspace = true }
acp-nats-agent  = { path = "../acp-nats-agent" }
agent-client-protocol = { workspace = true, features = [
    "unstable_auth_methods",
    "unstable_boolean_config",
    "unstable_cancel_request",
    "unstable_logout",
    "unstable_message_id",
    "unstable_session_close",
    "unstable_session_fork",
    "unstable_session_model",
    "unstable_session_resume",
    "unstable_session_usage",
] }
async-nats      = { workspace = true, features = ["jetstream", "kv"] }
trogon-nats     = { workspace = true }
trogon-registry = { workspace = true }
async-trait     = { workspace = true }
bytes           = { workspace = true }
futures-util    = { workspace = true }
reqwest         = { workspace = true }
serde           = { workspace = true }
serde_json      = { workspace = true }
tokio           = { workspace = true, features = ["rt", "rt-multi-thread", "macros", "sync", "signal", "time"] }
tracing         = { workspace = true }
tracing-subscriber = { workspace = true }
uuid            = { workspace = true }

[dev-dependencies]
axum                    = { workspace = true }
futures                 = { workspace = true }
testcontainers-modules = { workspace = true }
trogon-nats             = { workspace = true, features = ["test-support"] }
