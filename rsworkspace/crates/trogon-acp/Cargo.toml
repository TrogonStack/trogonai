[package]
name = "trogon-acp"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
acp-nats          = { path = "../acp-nats" }
agent-client-protocol = { version = "0.10.2", features = ["unstable_auth_methods", "unstable_session_model", "unstable_session_fork", "unstable_session_resume", "unstable_session_usage"] }
anyhow            = "1"
async-nats        = "0.46.0"
async-trait       = "0.1"
opentelemetry     = "0.31.0"
reqwest           = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
serde_json        = "1"
tokio             = { version = "1.49.0", features = ["full"] }
tokio-util        = { version = "0.7", features = ["compat"] }
tracing           = "0.1.44"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

trogon-agent-core = { path = "../trogon-agent-core" }
trogon-acp-runner = { path = "../trogon-acp-runner" }
trogon-nats       = { path = "../trogon-nats" }
trogon-std        = { path = "../trogon-std" }
uuid              = { version = "1", features = ["v4"] }

[dev-dependencies]
futures-util = "0.3"
trogon-nats = { path = "../trogon-nats", features = ["test-support"] }
testcontainers-modules = { version = "0.8", features = ["nats"] }

[[bin]]
name = "trogon-acp"
path = "src/main.rs"
