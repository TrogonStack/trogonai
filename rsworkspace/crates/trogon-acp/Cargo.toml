[package]
name = "trogon-acp"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
acp-nats          = { path = "../acp-nats" }
acp-nats-agent    = { path = "../acp-nats-agent" }
agent-client-protocol = { workspace = true, features = ["unstable_auth_methods", "unstable_session_model", "unstable_session_fork", "unstable_session_resume", "unstable_session_usage"] }
anyhow            = "1"
async-nats        = { workspace = true, features = ["jetstream", "kv"] }
bytes             = { workspace = true }
async-trait       = "0.1"
opentelemetry     = { workspace = true }
reqwest           = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
serde_json        = "1"
tokio             = { version = "1.49.0", features = ["full"] }
tokio-util        = { version = "0.7", features = ["compat"] }
tracing           = "0.1.44"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

trogon-agent-core = { path = "../trogon-agent-core" }
trogon-acp-runner = { path = "../trogon-acp-runner", features = [] }
trogon-nats       = { path = "../trogon-nats" }
trogon-std        = { path = "../trogon-std" }
uuid              = { version = "1", features = ["v4"] }

[dev-dependencies]
futures-util = "0.3"
trogon-acp-runner = { path = "../trogon-acp-runner", features = ["test-helpers"] }
trogon-nats = { path = "../trogon-nats", features = ["test-support"] }
testcontainers-modules = { workspace = true }

[[bin]]
name = "trogon-acp"
path = "src/main.rs"
