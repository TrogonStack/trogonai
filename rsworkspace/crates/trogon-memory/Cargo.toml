[package]
name = "trogon-memory"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[[bin]]
name = "trogon-memory"
path = "src/main.rs"

[dependencies]
async-nats = { workspace = true, features = ["jetstream", "kv"] }
bytes = { workspace = true }
futures-util = { workspace = true }
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
trogon-nats = { path = "../trogon-nats" }
trogon-std = { path = "../trogon-std" }
trogon-transcript = { path = "../trogon-transcript" }

[dev-dependencies]
axum = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
testcontainers-modules = { workspace = true }
trogon-nats = { path = "../trogon-nats", features = ["test-support"] }
trogon-std = { path = "../trogon-std", features = ["test-support"] }

[features]
default = []
test-support = []
