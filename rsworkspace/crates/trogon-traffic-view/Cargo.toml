[package]
name = "trogon-traffic-view"
version = "0.1.0"
edition = "2024"
description = "Agent-traffic view: audit projector traits and index surface (spec + skeleton)"

[lints]
workspace = true

[dependencies]
async-nats = { workspace = true, features = ["jetstream"] }
