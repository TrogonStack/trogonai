[package]
name = "trogon-cli"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "trogon"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
acp-nats               = { workspace = true }
agent-client-protocol  = { workspace = true, features = ["unstable_session_usage"] }
anyhow                 = "1"
async-nats             = { workspace = true, features = ["jetstream"] }
axum                   = { workspace = true }
async-trait            = { workspace = true }
bytes                  = { workspace = true }
clap                   = { workspace = true, features = ["env"] }
futures                = { workspace = true }
opentelemetry          = { workspace = true }
rustyline              = "14"
serde                  = { workspace = true }
serde_json             = { workspace = true }
tokio                  = { workspace = true, features = ["full"] }
tracing                = { workspace = true }
trogon-nats            = { workspace = true }
trogon-registry        = { workspace = true }
trogon-runner-tools    = { path = "../trogon-runner-tools" }
trogon-std             = { workspace = true }
uuid                   = { workspace = true }

[dev-dependencies]
futures                = { workspace = true }
reqwest                = { workspace = true }
tempfile               = { workspace = true }
testcontainers-modules = { workspace = true, features = ["nats"] }
tokio                  = { workspace = true, features = ["test-util"] }
trogon-nats            = { workspace = true }
trogon-registry        = { workspace = true, features = ["test-support"] }
