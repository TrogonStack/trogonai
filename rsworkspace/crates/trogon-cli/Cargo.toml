[package]
name = "trogon-cli"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
acp-nats               = { workspace = true }
agent-client-protocol  = { workspace = true }
async-nats             = { workspace = true, features = ["jetstream"] }
axum                   = { workspace = true }
opentelemetry          = { workspace = true }
serde_json             = { workspace = true }
tokio                  = { workspace = true, features = ["full"] }
tracing                = { workspace = true }
trogon-registry        = { workspace = true }
trogon-std             = { workspace = true }

[dev-dependencies]
futures                = { workspace = true }
reqwest                = { workspace = true }
testcontainers-modules = { workspace = true, features = ["nats"] }
tokio                  = { workspace = true, features = ["test-util"] }
trogon-nats            = { workspace = true }
trogon-registry        = { workspace = true, features = ["test-support"] }
