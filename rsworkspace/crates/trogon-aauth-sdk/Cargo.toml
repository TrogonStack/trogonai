[package]
name = "trogon-aauth-sdk"
version = "0.0.1"
edition = "2024"
license = "Apache-2.0"
description = "AAuth agent-side signer: mints NATS PoP headers over aa-agent+jwt and parses AAuth-Requirement deny replies"
publish = false

[lib]
name = "trogon_aauth_sdk"
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
async-trait = { workspace = true }
base64 = { workspace = true }
p256 = { version = "=0.13.2", features = ["ecdsa", "pkcs8"] }
rand_core = { version = "=0.6.4", features = ["getrandom"] }
reqwest = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["time"] }
trogon-aauth-verify = { workspace = true }
trogon-identity-types = { workspace = true }
url = { workspace = true }

[dev-dependencies]
jsonwebtoken = { version = "=10.4.0", features = ["rust_crypto"] }
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros", "time"] }
trogon-aauth-verify = { workspace = true }
wiremock = { workspace = true }
