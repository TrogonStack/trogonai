[package]
name = "trogon-aauth-sdk"
version = "0.0.1"
edition = "2024"
publish = false
description = "Agent-side SDK for AAuth: keypair, bootstrap, request signing (HTTP RFC 9421 + NATS), 401-retry."

[lints]
workspace = true

[dependencies]
trogon-identity-types = { workspace = true }
trogon-aauth-verify = { workspace = true }
async-nats = { workspace = true }
async-trait = { workspace = true }
base64 = { workspace = true }
bytes = { workspace = true }
futures = { workspace = true }
http = "=1.4.1"
jsonwebtoken = { version = "=10.4.0", features = ["rust_crypto"] }
p256 = { version = "=0.13.2", features = ["ecdsa", "pkcs8"] }
rand_core = { version = "=0.6.4" }
reqwest = { workspace = true, features = ["json", "rustls-tls"] }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
thiserror = "=2.0.18"
tokio = { workspace = true, features = ["sync", "macros", "rt-multi-thread"] }
tracing = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "test-util"] }
trogon-aauth-person = { workspace = true }
