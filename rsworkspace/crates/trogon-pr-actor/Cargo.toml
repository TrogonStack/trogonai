[package]
name = "trogon-pr-actor"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[[bin]]
name = "trogon-pr-actor"
path = "src/main.rs"

[dependencies]
acp-telemetry = { workspace = true }
async-nats = { workspace = true, features = ["jetstream", "kv"] }
clap = { workspace = true, features = ["derive"] }
confique = { workspace = true }
reqwest = { workspace = true, features = ["json"] }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tracing = { workspace = true }
trogon-actor = { workspace = true }
trogon-nats = { workspace = true }
trogon-registry = { workspace = true }
trogon-service-config = { workspace = true }
trogon-std = { workspace = true }
trogon-transcript = { workspace = true }

[dev-dependencies]
bytes = { workspace = true }
futures-util = { workspace = true }
serde_json = { workspace = true }
testcontainers-modules = { workspace = true }
trogon-actor = { workspace = true, features = ["test-support"] }
trogon-registry = { workspace = true }
trogon-transcript = { workspace = true }
