[package]
name = "trogon-decider-nats"
version = "0.1.0"
edition = "2024"
description = "NATS JetStream storage adapter for Trogon decider runtime"
license = "MIT"
repository = "https://github.com/TrogonStack/trogonai"

[lints.rust]
warnings = "deny"
unexpected_cfgs = { level = "deny", check-cfg = ['cfg(coverage)'] }

[lints.clippy]
all = "deny"
expect_used = "deny"
panic = "deny"
unwrap_used = "deny"

[dependencies]
async-nats = { workspace = true, features = ["jetstream", "kv", "server_2_12"] }
bytes = { workspace = true }
chrono = { version = "0.4", features = ["serde"] }
futures = { workspace = true }
serde_json = { workspace = true }
trogon-decider-runtime = { version = "0.1.0", path = "../trogon-decider-runtime" }
trogon-nats = { version = "0.1.0", path = "../trogon-nats" }
trogon-std = { version = "0.1.0", path = "../trogon-std", features = ["uuid"] }

[dev-dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "time"] }
uuid = { workspace = true }
