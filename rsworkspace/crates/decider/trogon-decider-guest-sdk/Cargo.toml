[package]
name = "trogon-decider-guest-sdk"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
publish = false

[features]
default = []
test-support = []

[lints.rust]
missing_docs = "warn"
warnings = "deny"
unexpected_cfgs = { level = "deny", check-cfg = ['cfg(coverage)', 'cfg(dylint_lib, values(any()))'] }

[lints.clippy]
all = "deny"
expect_used = "deny"
panic = "deny"
unwrap_used = "deny"

[dependencies]
buffa = { workspace = true }
thiserror = { workspace = true }
trogon-decider = { workspace = true }
trogon-decider-guest-macros = { workspace = true }
wit-bindgen = { workspace = true }

[dev-dependencies]
trybuild = "1"
trogonai-proto = { path = "../../platform/trogonai-proto", default-features = false, features = ["schedules"] }
