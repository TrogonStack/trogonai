[package]
name = "trogon-decider-guest-macros"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
publish = false

[lib]
proc-macro = true

[lints.rust]
missing_docs = "warn"
warnings = "deny"
unexpected_cfgs = { level = "deny", check-cfg = ['cfg(coverage)', 'cfg(dylint_lib, values(any()))'] }

[lints.clippy]
all = "deny"
expect_used = "deny"
panic = "deny"
unwrap_used = "deny"

[dependencies]
proc-macro2 = "1.0.106"
quote = "1.0.45"
syn = { version = "2.0.117", features = ["full"] }
trogon-decider-wit = { workspace = true }

[dev-dependencies]
trybuild = "1"
thiserror = { workspace = true }
trogon-decider = { workspace = true }
trogon-decider-guest-sdk = { workspace = true }
trogon-scheduler-domain = { path = "../../scheduler/trogon-scheduler-domain" }
trogonai-proto = { path = "../../platform/trogonai-proto", default-features = false, features = ["schedules"] }
wit-bindgen = { workspace = true }
