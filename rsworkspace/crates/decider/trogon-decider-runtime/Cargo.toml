[package]
name = "trogon-decider-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime execution, stream, and snapshot primitives for Trogon deciders"
license = "Apache-2.0"
repository = "https://github.com/TrogonStack/trogonai"

[features]
test-support = ["trogon-decider/test-support"]

[lints.rust]
missing_docs = "warn"
warnings = "deny"
unexpected_cfgs = { level = "deny", check-cfg = ['cfg(coverage)'] }

[lints.clippy]
all = "deny"
expect_used = "deny"
panic = "deny"
unwrap_used = "deny"

[dependencies]
thiserror = { workspace = true }
chrono = { version = "0.4", features = ["serde"] }
futures = { workspace = true }
opentelemetry = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["rt", "sync"] }
tracing = { workspace = true }
trogon-decider = { version = "0.1.0", path = "../trogon-decider" }
trogon-semconv = { workspace = true }
trogon-std = { version = "0.1.0", path = "../../platform/trogon-std", features = ["uuid"] }
uuid = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "time"] }
