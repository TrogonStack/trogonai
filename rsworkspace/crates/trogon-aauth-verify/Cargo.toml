[package]
name = "trogon-aauth-verify"
version = "0.0.1"
edition = "2024"
license = "Apache-2.0"
description = "AAuth verifier: parses aa-agent+jwt / aa-auth+jwt, validates JWT signatures against pluggable JWKS, and verifies HTTP / NATS proof-of-possession envelopes"
publish = false

[lib]
name = "trogon_aauth_verify"
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
async-trait = { workspace = true }
base64 = { workspace = true }
# AAuth tokens rely on JWS shapes (esp. EC `kid`-based selection) that the
# crate's parser only models cleanly from jsonwebtoken 10.x; keep the
# version pin local to this crate so main's other jsonwebtoken 9.3
# consumers (auth-callout, etc.) are not forced to upgrade in lockstep.
jsonwebtoken = { version = "=10.4.0", features = ["rust_crypto"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
time = { workspace = true }
tokio = { workspace = true, features = ["sync"] }
trogon-identity-types = { workspace = true }

[dev-dependencies]
ed25519-dalek = { version = "=2.2.0", features = ["std", "rand_core", "pkcs8"] }
p256 = { version = "=0.13.2", features = ["ecdsa", "pkcs8"] }
pkcs8 = { version = "=0.10.2", features = ["pem"] }
rand_core = { version = "=0.6.4" }
tokio = { workspace = true, features = ["rt", "macros", "sync"] }
