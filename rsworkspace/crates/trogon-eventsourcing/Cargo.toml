[package]
name = "trogon-eventsourcing"
version = "0.1.0"
edition = "2024"

[lints.rust]
warnings = "deny"
unexpected_cfgs = { level = "deny", check-cfg = ['cfg(coverage)'] }

[lints.clippy]
all = "deny"
expect_used = "deny"
panic = "deny"
unwrap_used = "deny"

[dependencies]
async-nats = { workspace = true, features = ["jetstream", "kv", "server_2_12"] }
chrono = { version = "0.4", features = ["serde"] }
futures = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
trogon-nats = { path = "../trogon-nats" }
trogon-std = { path = "../trogon-std", features = ["uuid"] }
uuid = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "time"] }
trybuild = "1"
