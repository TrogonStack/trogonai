[package]
name = "trogonai-proto"
version = "0.1.0"
edition = "2024"
publish = false

[lints]
workspace = true

[features]
default = []
chrono = ["dep:buffa-types", "dep:chrono"]
schedules = ["dep:buffa", "dep:buffa-types", "dep:serde", "dep:trogon-decider-runtime", "chrono"]

[dependencies]
buffa = { workspace = true, optional = true }
buffa-types = { workspace = true, optional = true }
chrono = { version = "0.4", optional = true }
serde = { workspace = true, optional = true }
trogon-decider-runtime = { workspace = true, optional = true }
