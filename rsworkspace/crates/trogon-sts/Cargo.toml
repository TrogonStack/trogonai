[package]
name = "trogon-sts"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "trogon-sts"
path = "src/main.rs"

[[bin]]
name = "trogon-sts-probe"
path = "src/bin/probe.rs"

[[bin]]
name = "trogon-sts-publish-trust-bundle"
path = "src/bin/publish_trust_bundle.rs"

[lints]
workspace = true

[dependencies]
async-nats = { workspace = true }
async-trait = { workspace = true }
bytes = { workspace = true }
clap = { workspace = true, features = ["derive", "env"] }
futures = { workspace = true }
base64 = { workspace = true }
hex = { workspace = true }
jsonwebtoken = { version = "=10.4.0", features = ["rust_crypto"] }
moka = { workspace = true }
reqwest = { version = "=0.12.22", default-features = false, features = ["json", "rustls-tls"] }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
thiserror = "2.0.18"
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "signal", "sync", "time", "fs"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["fmt", "env-filter"] }
trogon-identity-types = { workspace = true }
trogon-nats = { workspace = true }
x509-parser = { workspace = true, features = ["verify"] }

aws-config = { version = "=1.8.12", optional = true }
aws-sdk-kms = { version = "=1.96.0", optional = true }

[dev-dependencies]
base64 = { workspace = true }
rand = { workspace = true }
rcgen = { workspace = true }
rsa = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["process"] }
wiremock = { workspace = true }

[features]
default = ["file-pem"]
file-pem = []
kms-aws = ["dep:aws-config", "dep:aws-sdk-kms"]
vault = []
test-support = []
