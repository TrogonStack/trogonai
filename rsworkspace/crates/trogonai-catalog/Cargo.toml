[package]
name = "trogonai-catalog"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
name = "trogonai_catalog"
path = "src/lib.rs"

[[bin]]
name = "trogonai-catalog"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
async-nats = { workspace = true, features = ["ring", "nkeys", "jetstream", "kv"] }
buffa = "=0.7.0"
bytes = { workspace = true }
clap = { workspace = true }
confique = { workspace = true }
futures-util = { workspace = true }
reqwest = { workspace = true, features = ["json"] }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = "2"
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "time", "signal"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
trogon-service-config = { workspace = true }
trogon-telemetry = { workspace = true }
trogonai-catalog-client = { workspace = true }
trogonai-catalog-proto = { workspace = true }
