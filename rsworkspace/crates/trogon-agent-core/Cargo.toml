[package]
name = "trogon-agent-core"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
reqwest       = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
serde         = { version = "1.0.228", features = ["derive"] }
serde_json    = "1.0.149"
tokio         = { version = "1.49.0", features = ["full"] }
tracing       = "0.1.44"

trogon-mcp     = { path = "../trogon-mcp" }
trogon-splitio = { path = "../trogon-splitio" }
trogon-std     = { path = "../trogon-std" }

[dev-dependencies]
httpmock       = "0.7"
trogon-splitio = { path = "../trogon-splitio" }
