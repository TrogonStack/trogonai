[package]
name = "trogon-openrouter-runner"
version = "0.0.1"
edition = "2024"
license = "Apache-2.0"

[features]
test-helpers = []

[[test]]
name = "agent_nats_integration"
required-features = ["test-helpers"]

[[test]]
name = "tool_dispatch_integration"
required-features = ["test-helpers"]

[[test]]
name = "perm_integration"
required-features = ["test-helpers"]

[lints]
workspace = true

[dependencies]
acp-nats        = { workspace = true }
acp-nats-agent  = { path = "../../acp/acp-nats-agent" }
agent-client-protocol = { workspace = true }
async-nats      = { workspace = true, features = ["jetstream", "kv"] }
opentelemetry   = { workspace = true }
trogon-nats         = { workspace = true }
trogon-registry     = { workspace = true }
trogon-runner-tools = { path = "../trogon-runner-tools" }
trogonai-session-kernel = { workspace = true }
trogonai-session-contracts = { workspace = true }
trogonai-catalog-client = { workspace = true }
trogonai-compactor-proto = { workspace = true }
buffa = "=0.7.0"
buffa-types = "=0.7.0"
trogon-std          = { workspace = true }
trogon-tools        = { path = "../trogon-tools" }
async-trait     = { workspace = true }
bytes           = { workspace = true }
futures-util    = { workspace = true }
reqwest         = { workspace = true }
serde           = { workspace = true }
serde_json      = { workspace = true }
tokio           = { workspace = true, features = ["rt", "rt-multi-thread", "macros", "sync", "signal", "time"] }
tracing         = { workspace = true }
tracing-subscriber = { workspace = true }
uuid            = { workspace = true }

[dev-dependencies]
axum                    = { workspace = true }
futures                 = { workspace = true }
httpmock                = "0.7"
tempfile                = { workspace = true }
testcontainers-modules  = { version = "0.15", features = ["nats"] }
trogon-nats             = { workspace = true, features = ["test-support"] }
trogon-registry         = { workspace = true, features = ["test-support"] }
