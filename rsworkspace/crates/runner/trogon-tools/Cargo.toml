[package]
name = "trogon-tools"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"

[lints]
workspace = true

[dependencies]
base64     = "0.22"
pdf-extract = "0.9"
reqwest    = { version = "0.12", default-features = false, features = ["rustls-tls", "json", "stream"] }
serde      = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio      = { version = "1", features = ["full"] }
url        = "2"
globset    = "0.4"
html2text  = "0.12"
ignore     = "0.4"
regex      = "1"
shlex      = "1.3"

[dev-dependencies]
httpmock = "0.7"
reqwest  = { version = "0.12", default-features = false, features = ["rustls-tls"] }
tempfile = "3"
