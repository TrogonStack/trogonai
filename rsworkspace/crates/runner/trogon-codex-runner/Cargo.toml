[package]
name = "trogon-codex-runner"
version = "0.0.1"
edition = "2024"
license = "Apache-2.0"

[lints]
workspace = true

# Test helper: simulates `codex app-server` JSON-RPC protocol.
# Used via CODEX_BIN env var in integration tests.
[[bin]]
name = "mock_codex_server"
path = "src/bin/mock_codex_server.rs"

[dependencies]
acp-nats        = { workspace = true }
acp-nats-agent  = { path = "../../acp/acp-nats-agent" }
agent-client-protocol = { workspace = true }
async-nats      = { workspace = true }
async-trait     = { workspace = true }
trogon-nats     = { workspace = true }
serde           = { workspace = true }
serde_json      = { workspace = true }
tokio           = { workspace = true, features = ["rt", "rt-multi-thread", "macros", "sync", "process", "io-util", "signal", "time"] }
trogon-registry     = { workspace = true }
trogon-runner-tools = { path = "../trogon-runner-tools" }
trogon-tools        = { path = "../trogon-tools" }
trogonai-session-kernel = { workspace = true }
trogonai-session-contracts = { workspace = true }
buffa = "=0.7.0"
buffa-types = "=0.7.0"
tracing         = { workspace = true }
tracing-subscriber = { workspace = true }
uuid            = { workspace = true }

[dev-dependencies]
serde_json               = { workspace = true }
tempfile                 = { workspace = true }
testcontainers-modules   = { workspace = true }
trogon-xai-runner        = { path = "../trogon-xai-runner", features = ["test-helpers"] }
trogon-openrouter-runner = { path = "../trogon-openrouter-runner", features = ["test-helpers"] }
trogon-registry          = { workspace = true, features = ["test-support"] }
