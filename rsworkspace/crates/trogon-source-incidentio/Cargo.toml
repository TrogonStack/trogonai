[package]
name = "trogon-source-incidentio"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
async-nats = { workspace = true, features = ["jetstream"] }
axum = { workspace = true }
base64 = "0.22"
bytes = { workspace = true }
hmac = "0.12"
serde_json = { workspace = true }
sha2 = "0.10"
subtle = "2.6"
tokio = { workspace = true, features = ["full"] }
tracing = { workspace = true }
trogon-nats = { workspace = true }
trogon-std = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
tower = "0.5"
tracing-subscriber = { workspace = true }
trogon-nats = { workspace = true, features = ["test-support"] }
trogon-std = { workspace = true, features = ["test-support"] }
testcontainers-modules = { version = "0.8", features = ["nats"] }
futures-util = { workspace = true }
