[package]
name = "telegram-nats"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
telegram-types = { workspace = true }
trogon-nats = { workspace = true }
trogon-std = { workspace = true }

async-nats = { workspace = true, features = ["jetstream", "kv"] }
bytes = { workspace = true }
chrono = { workspace = true }
futures = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
trogon-nats = { workspace = true, features = ["test-support"] }
trogon-std = { workspace = true, features = ["test-support"] }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "time"] }
