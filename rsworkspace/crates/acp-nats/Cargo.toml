[package]
name = "acp-nats"
version = "0.1.0"
edition = "2024"

[dependencies]
agent-client-protocol = "0.9.3"
async-nats = "0.45.0"
async-trait = "0.1.89"
bytes = "1"
futures = "0.3.31"
opentelemetry = "0.31.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.49.0", features = ["process", "io-util", "io-std", "rt-multi-thread", "macros", "sync", "signal"] }
tracing = "0.1.44"
tracing-opentelemetry = "0.32.1"
uuid = { version = "1.16", features = ["v4"] }

# Shared NATS infrastructure
trogon-nats = { path = "../trogon-nats" }

[dev-dependencies]
opentelemetry_sdk = { version = "0.31.0", features = ["rt-tokio", "metrics", "testing"] }
trogon-nats = { path = "../trogon-nats", features = ["test-support"] }
