[package]
name = "acp-nats"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
agent-client-protocol = { version = "0.9.4", features = ["unstable_session_list", "unstable_session_model", "unstable_session_fork", "unstable_session_resume", "unstable_session_usage"] }
opentelemetry = "0.31.0"
async-nats = "0.45.0"
async-trait = "0.1.89"
bytes = "1"
futures-util = "0.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.49.0", features = ["rt", "macros", "sync", "time"] }
tracing = "0.1.44"
uuid = { version = "1", features = ["v4"] }

trogon-nats = { path = "../trogon-nats" }
trogon-std = { path = "../trogon-std" }

[dev-dependencies]
agent-client-protocol = "0.9.4"
futures-util = "0.3"
opentelemetry = "0.31.0"
opentelemetry_sdk = { version = "0.31.0", features = ["rt-tokio", "metrics", "testing"] }
testcontainers-modules = { version = "0.8", features = ["nats"] }
tokio = { version = "1.49.0", features = ["full"] }
trogon-nats = { path = "../trogon-nats", features = ["test-support"] }
trogon-std = { path = "../trogon-std", features = ["test-support"] }
