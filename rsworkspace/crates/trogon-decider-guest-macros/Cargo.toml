[package]
name = "trogon-decider-guest-macros"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
publish = false

[lib]
proc-macro = true

[lints]
workspace = true

[dependencies]
proc-macro2 = "1.0.106"
quote = "1.0.45"
syn = { version = "2.0.117", features = ["full"] }

[dev-dependencies]
trybuild = "1"
thiserror = { workspace = true }
trogon-decider = { workspace = true }
trogon-decider-guest-sdk = { workspace = true }
trogon-decider-wit = { workspace = true, features = ["guest"] }
trogon-scheduler-domain = { path = "../trogon-scheduler-domain" }
trogonai-proto = { path = "../trogonai-proto", default-features = false, features = ["schedules"] }
wit-bindgen = { workspace = true }
