[package]
name = "trogon-source-sentry"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
async-nats = { workspace = true, features = ["jetstream"] }
axum = { workspace = true }
hex = "0.4"
hmac = "0.13"
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = "0.11"
tracing = { workspace = true }
trogon-nats = { workspace = true }
trogon-std = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
tower = "0.5"
tracing-subscriber = { workspace = true }
trogon-nats = { workspace = true, features = ["test-support"] }
trogon-std = { workspace = true }
testcontainers-modules = { version = "0.8", features = ["nats"] }
futures-util = { workspace = true }
hmac = "0.13"
sha2 = "0.11"
