[package]
name = "trogon-mcp-gateway"
version = "0.0.1"
edition = "2024"
license.workspace = true
publish.workspace = true

[lints]
workspace = true

[dependencies]
async-nats = { workspace = true }
async-trait = { workspace = true }
base64 = { workspace = true }
bytes = { workspace = true }
cel-interpreter = "=0.10.0"
clap = { workspace = true }
futures = { workspace = true }
hex = { workspace = true }
jsonwebtoken = { version = "=10.4.0", features = ["rust_crypto"] }
mcp-nats = { workspace = true }
nkeys = { workspace = true }
moka = { workspace = true }
notify = { workspace = true }
pem = "=3.0.6"
reqwest = { version = "=0.12.22", default-features = false, features = ["json", "rustls-tls"] }
rustls = { workspace = true }
rustls-pemfile = { workspace = true }
rustls-pki-types = { workspace = true }
rustls-webpki = { workspace = true }
tokio-rustls = { workspace = true }
x509-parser = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_norway = { workspace = true }
sha2 = { workspace = true }
spicedb-rs-client = "=1.49.2"
thiserror = "=2.0.18"
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "signal", "sync"] }
tracing = { workspace = true }
tracing-opentelemetry = { workspace = true }
trogon-identity-types = { path = "../trogon-identity-types" }
trogon-aauth-verify = { workspace = true }
trogon-nats = { workspace = true }
trogon-sts = { workspace = true }
trogon-sts-client = { workspace = true }
trogon-std = { workspace = true, features = ["clap", "signal"] }
trogon-telemetry = { workspace = true }
wasmtime = { workspace = true, features = ["component-model", "component-model-async"] }

[dev-dependencies]
nkeys = { workspace = true }
base64 = { workspace = true }
bytes = { workspace = true }
jsonwebtoken = { version = "=10.4.0", features = ["rust_crypto"] }
rand = { workspace = true }
rcgen = { workspace = true }
rsa = { workspace = true }
serde_json = { workspace = true }
static_assertions = "1.1.0"
tempfile = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
trogon-sts = { workspace = true }
trogon-sts-client = { workspace = true }
uuid = { workspace = true }
criterion = "=0.5.1"

[[bench]]
name = "latency_baseline"
harness = false
