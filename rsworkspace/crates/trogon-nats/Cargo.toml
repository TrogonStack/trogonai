[package]
name = "trogon-nats"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
async-nats = { version = "0.46.0", default-features = false, features = ["ring", "nkeys"] }
bytes = "1"
futures = "0.3.32"
opentelemetry = "0.31.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.50.0", features = ["time"] }
tracing = "0.1.44"
tracing-opentelemetry = "0.32.1"
trogon-std = { path = "../trogon-std" }

[dev-dependencies]
tokio = { version = "1.50.0", features = ["macros", "rt-multi-thread"] }
testcontainers-modules = { version = "0.8", features = ["nats"] }
trogon-std = { path = "../trogon-std", features = ["test-support"] }

[features]
default = []
test-support = []
