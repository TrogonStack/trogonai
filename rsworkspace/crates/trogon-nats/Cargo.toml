[package]
name = "trogon-nats"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
async-nats = { workspace = true, features = ["ring", "nkeys", "jetstream", "kv", "object-store", "server_2_11"] }
bytes = { workspace = true }
futures = { workspace = true }
opentelemetry = { workspace = true }
opentelemetry-semantic-conventions = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["time", "io-util"] }
tracing = { workspace = true }
tracing-opentelemetry = { workspace = true }
trogon-std = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
futures-util = { workspace = true }
testcontainers-modules = { version = "0.15", features = ["nats"] }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
tracing-subscriber = { workspace = true }
trogon-std = { workspace = true, features = ["test-support"] }

[features]
default = []
test-support = []
