[package]
name = "trogon-agent-registry-controller"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "trogon-agent-registry-controller"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
async-nats = { workspace = true, features = ["jetstream", "kv"] }
async-trait = { workspace = true }
base64 = { workspace = true }
clap = { workspace = true, features = ["derive", "env"] }
ed25519-dalek = { workspace = true, features = ["pkcs8", "rand_core", "std"] }
futures = { workspace = true }
hex = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
time = { workspace = true, features = ["formatting", "macros", "parsing"] }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "signal", "sync", "process", "fs", "time"] }
toml = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter", "fmt", "json"] }
trogon-agent-registry = { path = "../trogon-agent-registry" }
trogon-nats = { workspace = true }
trogon-std = { workspace = true, features = ["signal"] }

[dev-dependencies]
ed25519-dalek = { workspace = true, features = ["pkcs8", "rand_core", "std"] }
rcgen = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
