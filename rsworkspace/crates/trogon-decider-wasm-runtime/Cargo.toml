[package]
name = "trogon-decider-wasm-runtime"
version = "0.1.0"
edition = "2024"
description = "Production host runtime for compiled WASM Trogon decider components"
license = "Apache-2.0"
repository = "https://github.com/TrogonStack/trogonai"
publish = false

[lints.rust]
missing_docs = "warn"
warnings = "deny"
unexpected_cfgs = { level = "deny", check-cfg = ['cfg(coverage)', 'cfg(dylint_lib, values(any()))'] }

[lints.clippy]
all = "deny"
expect_used = "deny"
panic = "deny"
unwrap_used = "deny"

[dependencies]
base64 = { workspace = true }
opentelemetry = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["rt"] }
tracing = { workspace = true }
trogon-decider-runtime = { workspace = true }
trogon-decider-wit = { workspace = true, features = ["host"] }
trogon-semconv = { workspace = true }
trogon-std = { workspace = true, features = ["uuid"] }
wasmtime = { version = "=46.0.1", default-features = false, features = ["anyhow", "component-model", "pooling-allocator", "runtime", "cranelift"] }

[dev-dependencies]
async-nats = { workspace = true, features = ["jetstream", "kv", "server_2_10", "server_2_12"] }
buffa = { workspace = true }
buffa-types = { workspace = true }
chrono = { version = "0.4" }
testcontainers-modules = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
trogon-decider-nats = { workspace = true }
trogon-decider-runtime = { workspace = true, features = ["test-support"] }
trogonai-proto = { path = "../trogonai-proto", default-features = false, features = ["schedules"] }
uuid = { workspace = true }
