[package]
name = "trogon-webhook-dispatcher"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[[bin]]
name = "trogon-webhook-dispatcher"
path = "src/main.rs"

[dependencies]
async-nats = { workspace = true, features = ["jetstream", "kv"] }
axum = { workspace = true }
bytes = { workspace = true }
futures-util = { workspace = true }
hex = "0.4"
hmac = "0.12"
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = "0.10"
tokio = { workspace = true, features = ["full"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
trogon-nats = { path = "../trogon-nats" }
trogon-std = { path = "../trogon-std" }
uuid = { workspace = true }

[dev-dependencies]
futures = { workspace = true }
testcontainers-modules = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
tower = "0.5"
trogon-nats = { path = "../trogon-nats", features = ["test-support"] }
trogon-std = { path = "../trogon-std", features = ["test-support"] }

[features]
default = []
test-support = []
