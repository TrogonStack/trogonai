[package]
name = "telegram-bot"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
telegram-types = { workspace = true }
telegram-nats = { workspace = true }
trogon-nats = { workspace = true }
trogon-std = { workspace = true }
acp-telemetry = { workspace = true }

teloxide = { workspace = true }
dptree = { workspace = true }
async-nats = { workspace = true, features = ["jetstream", "kv"] }
tokio = { workspace = true, features = ["full"] }
futures = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
tracing = { workspace = true }
clap = { workspace = true, features = ["env"] }
anyhow = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true }
axum = { workspace = true }
url = { workspace = true }
mime = { workspace = true }
reqwest = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
trogon-nats = { workspace = true, features = ["test-support"] }
trogon-std = { workspace = true, features = ["test-support"] }
