services:
  nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir=/data"]
    ports:
      - "4222:4222"
      - "8222:8222"   # monitoring
    volumes:
      - nats-data:/data
    restart: unless-stopped

  trogon-linear:
    build:
      context: ../..          # rsworkspace/ — workspace root
      dockerfile: crates/trogon-linear/Dockerfile
    ports:
      - "8080:8080"
    environment:
      NATS_URL: "nats:4222"
      LINEAR_WEBHOOK_SECRET: "${LINEAR_WEBHOOK_SECRET:-}"
      LINEAR_WEBHOOK_PORT: "8080"
      LINEAR_SUBJECT_PREFIX: "linear"
      LINEAR_STREAM_NAME: "LINEAR"
      LINEAR_STREAM_MAX_AGE_SECS: "${LINEAR_STREAM_MAX_AGE_SECS:-604800}"
      LINEAR_WEBHOOK_TIMESTAMP_TOLERANCE_SECS: "${LINEAR_WEBHOOK_TIMESTAMP_TOLERANCE_SECS:-60}"
      RUST_LOG: "info"
    depends_on:
      - nats
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3

volumes:
  nats-data:
