[package]
name = "trogon-compactor"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"

[lints]
workspace = true

[dependencies]
async-nats  = { workspace = true, features = ["ring", "nkeys"] }
futures     = { workspace = true }
reqwest     = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
serde       = { workspace = true }
serde_json  = { workspace = true }
thiserror   = "2"
tokio       = { workspace = true, features = ["rt-multi-thread", "macros", "time"] }
tracing     = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
trogonai-compactor-proto = { workspace = true }
trogonai-catalog-client = { workspace = true }
trogon-telemetry = { workspace = true }
trogon-std = { workspace = true }
opentelemetry = { workspace = true }
opentelemetry-semantic-conventions = { workspace = true }
uuid        = { workspace = true }
buffa = "=0.7.0"

[dev-dependencies]
trogonai-catalog-proto = { workspace = true }
httpmock               = "0.7"
tokio                  = { workspace = true, features = ["macros", "rt-multi-thread"] }
testcontainers-modules = { workspace = true }
async-nats             = { workspace = true }
opentelemetry_sdk      = { workspace = true, features = ["testing"] }
