[package]
name = "trogon-acp-runner"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
acp-nats      = { path = "../acp-nats" }
anyhow        = "1"
async-nats    = "0.45.0"
bytes         = "1"
futures-util  = "0.3"
reqwest       = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
serde         = { version = "1.0.228", features = ["derive"] }
serde_json    = "1.0.149"
tokio         = { version = "1.49.0", features = ["full"] }
tracing       = "0.1.44"

trogon-agent-core = { path = "../trogon-agent-core" }
trogon-mcp        = { path = "../trogon-mcp" }
trogon-nats       = { path = "../trogon-nats" }
trogon-std        = { path = "../trogon-std" }

[dev-dependencies]
testcontainers-modules = { version = "0.8", features = ["nats"] }
