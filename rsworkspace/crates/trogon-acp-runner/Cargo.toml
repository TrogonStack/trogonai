[package]
name = "trogon-acp-runner"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
acp-nats        = { path = "../acp-nats" }
acp-nats-agent  = { path = "../acp-nats-agent" }
async-trait     = "0.1"
agent-client-protocol = { version = "0.10.2", features = [
    "unstable_auth_methods",
    "unstable_boolean_config",
    "unstable_cancel_request",
    "unstable_message_id",
    "unstable_session_close",
    "unstable_session_fork",
    "unstable_session_model",
    "unstable_session_resume",
    "unstable_session_usage",
] }
uuid          = { version = "1", features = ["v4"] }
anyhow        = "1"
async-nats    = { workspace = true, features = ["jetstream", "kv"] }
bytes         = "1"
futures-util  = "0.3"
reqwest       = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
serde         = { version = "1.0.228", features = ["derive"] }
serde_json    = "1.0.149"
tokio         = { version = "1.49.0", features = ["full"] }
tracing            = "0.1.44"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

trogon-agent-core = { path = "../trogon-agent-core" }
trogon-mcp        = { path = "../trogon-mcp" }
trogon-nats       = { path = "../trogon-nats" }
trogon-std        = { path = "../trogon-std" }

[features]
test-helpers = []

[[test]]
name = "agent_unit"
required-features = ["test-helpers"]

[[test]]
name = "steer_integration"
required-features = ["test-helpers"]

[[test]]
name = "session_branching_nats"
required-features = ["test-helpers"]

[dev-dependencies]
futures                = "0.3"
httpmock               = "0.7"
opentelemetry          = { workspace = true }
testcontainers-modules = { version = "0.8", features = ["nats"] }
trogon-nats            = { path = "../trogon-nats", features = ["test-support"] }
trogon-std             = { path = "../trogon-std", features = ["test-support"] }
