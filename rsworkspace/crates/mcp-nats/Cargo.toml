[package]
name = "mcp-nats"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
async-nats = { workspace = true }
bytes = { workspace = true }
futures = { workspace = true }
rmcp = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
