[package]
name = "trogon-aauth-as"
version = "0.0.1"
edition = "2024"
license = "Apache-2.0"
description = "AAuth Access Server: four-party organization-side issuer that federates with a Person Server to mint aa-auth+jwt for organization resources"
publish = false

[lib]
name = "trogon_aauth_as"
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
async-trait = { workspace = true }
axum = { workspace = true }
base64 = { workspace = true }
jsonwebtoken = { version = "=10.4.0", features = ["rust_crypto"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["sync"] }
trogon-aauth-verify = { workspace = true }
trogon-identity-types = { workspace = true }

[dev-dependencies]
axum = { workspace = true }
p256 = { version = "=0.13.2", features = ["ecdsa", "pkcs8"] }
pkcs8 = { version = "=0.10.2", features = ["pem"] }
rand_core = { version = "=0.6.4" }
tokio = { workspace = true, features = ["rt", "macros", "sync"] }
tower = { workspace = true }
