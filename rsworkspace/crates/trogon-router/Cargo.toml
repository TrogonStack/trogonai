[package]
name = "trogon-router"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
async-nats = { workspace = true, features = ["jetstream"] }
bytes = { workspace = true }
futures-util = { workspace = true }
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
trogon-nats = { workspace = true }
trogon-registry = { workspace = true }
trogon-transcript = { workspace = true }

[dev-dependencies]
axum = { workspace = true }
futures-util = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
trogon-nats = { workspace = true, features = ["test-support"] }
trogon-registry = { workspace = true, features = ["test-helpers"] }
trogon-transcript = { workspace = true, features = ["test-helpers"] }
testcontainers-modules = { workspace = true }

[features]
default = []
test-helpers = []
