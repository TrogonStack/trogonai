[package]
name = "trogon-router"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[[bin]]
name = "trogon-router"
path = "src/main.rs"

[dependencies]
acp-telemetry = { workspace = true }
async-nats = { workspace = true, features = ["jetstream"] }
bytes = { workspace = true }
clap = { workspace = true }
confique = { workspace = true }
futures-util = { workspace = true }
opentelemetry = { workspace = true }
reqwest = { workspace = true, features = ["json"] }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tracing = { workspace = true }
uuid = { workspace = true }
trogon-actor = { workspace = true }
trogon-nats = { workspace = true }
trogon-registry = { workspace = true }
trogon-service-config = { workspace = true }
trogon-std = { workspace = true }
trogon-transcript = { workspace = true }

[dev-dependencies]
axum = { workspace = true }
bytes = { workspace = true }
futures-util = { workspace = true }
serde = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
trogon-actor = { workspace = true }
trogon-nats = { workspace = true, features = ["test-support"] }
trogon-registry = { workspace = true, features = ["test-support"] }
trogon-transcript = { workspace = true, features = ["test-support"] }
testcontainers-modules = { workspace = true }

[features]
default = []
test-support = []
