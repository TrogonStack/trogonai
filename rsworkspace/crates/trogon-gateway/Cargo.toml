[package]
name = "trogon-gateway"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[[bin]]
name = "trogon-gateway"
path = "src/main.rs"

[dependencies]
acp-telemetry = { workspace = true }
async-nats = { workspace = true, features = ["jetstream"] }
axum = { workspace = true }
clap = { workspace = true }
confique = { workspace = true }
serde = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tower-http = { workspace = true }
tracing = { workspace = true }
trogon-nats = { workspace = true }
trogon-service-config = { workspace = true }
trogon-source-discord = { workspace = true }
trogon-source-github = { workspace = true }
trogon-source-gitlab = { workspace = true }
trogon-source-incidentio = { workspace = true }
trogon-source-linear = { workspace = true }
trogon-source-notion = { workspace = true }
trogon-source-slack = { workspace = true }
trogon-source-telegram = { workspace = true }
trogon-std = { workspace = true, features = ["clap"] }

[dev-dependencies]
tempfile = { workspace = true }
trogon-nats = { workspace = true, features = ["test-support"] }
