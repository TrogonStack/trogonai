[alias]
cov = [
    "llvm-cov",
    "--all-features",
    "--workspace",
    "--ignore-filename-regex",
    "crates/trogonai-proto/src/gen/.*",
]

[target.wasm32-wasip2]
rustflags = ['--cfg', 'getrandom_backend="unsupported"']

[target.wasm32-unknown-unknown]
rustflags = ['--cfg', 'getrandom_backend="unsupported"']
