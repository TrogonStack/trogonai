[alias]
# Ignore generated sources. Codegen output (proto/semconv `src/gen`) is not
# authored by hand and is not meaningfully covered by host tests, so it is
# excluded from the host coverage gate.
cov = [
    "llvm-cov",
    "--all-features",
    "--workspace",
    "--ignore-filename-regex",
    "crates/(trogonai-proto|trogon-semconv)/src/gen/.*",
]

[target.wasm32-wasip2]
rustflags = ['--cfg', 'getrandom_backend="unsupported"']

[target.wasm32-unknown-unknown]
rustflags = ['--cfg', 'getrandom_backend="unsupported"']
