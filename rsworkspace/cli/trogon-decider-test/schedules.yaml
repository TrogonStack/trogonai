suite: scheduler.schedules
events:
  - trogonai.scheduler.schedules.v1.ScheduleCreated
  - trogonai.scheduler.schedules.v1.SchedulePaused
  - trogonai.scheduler.schedules.v1.ScheduleResumed
  - trogonai.scheduler.schedules.v1.ScheduleRemoved
scenarios:
  - name: create schedule from initial state
    given: []
    when:
      '@type': type.googleapis.com/trogonai.scheduler.schedules.v1.CreateSchedule
      schedule_id: backup
      status:
        scheduled: {}
      schedule:
        every:
          every: 30s
      delivery:
        nats_message:
          subject: agent.run
      message:
        content:
          content_type: application/json
          data: eyJraW5kIjoiaGVhcnRiZWF0In0=
    then:
      events:
        - '@type': type.googleapis.com/trogonai.scheduler.schedules.v1.ScheduleCreated
          schedule_id: backup
          status:
            scheduled: {}
          schedule:
            every:
              every: 30s
          delivery:
            nats_message:
              subject: agent.run
          message:
            content:
              content_type: application/json
              data: eyJraW5kIjoiaGVhcnRiZWF0In0=

  - name: reject create when schedule already exists
    given:
      - '@type': type.googleapis.com/trogonai.scheduler.schedules.v1.ScheduleCreated
        schedule_id: backup
        status:
          scheduled: {}
        schedule:
          every:
            every: 30s
        delivery:
          nats_message:
            subject: agent.run
        message:
          content:
            content_type: application/json
            data: eyJraW5kIjoiaGVhcnRiZWF0In0=
    when:
      '@type': type.googleapis.com/trogonai.scheduler.schedules.v1.CreateSchedule
      schedule_id: backup
      status:
        scheduled: {}
      schedule:
        every:
          every: 30s
      delivery:
        nats_message:
          subject: agent.run
      message:
        content:
          content_type: application/json
          data: eyJraW5kIjoiaGVhcnRiZWF0In0=
    then:
      rejected: true

  - name: pause an existing schedule
    given:
      - '@type': type.googleapis.com/trogonai.scheduler.schedules.v1.ScheduleCreated
        schedule_id: backup
        status:
          scheduled: {}
        schedule:
          every:
            every: 30s
        delivery:
          nats_message:
            subject: agent.run
        message:
          content:
            content_type: application/json
            data: e30=
    when:
      '@type': type.googleapis.com/trogonai.scheduler.schedules.v1.PauseSchedule
      schedule_id: backup
    then:
      events:
        - '@type': type.googleapis.com/trogonai.scheduler.schedules.v1.SchedulePaused
          schedule_id: backup

  - name: reject pause when schedule missing
    given: []
    when:
      '@type': type.googleapis.com/trogonai.scheduler.schedules.v1.PauseSchedule
      schedule_id: backup
    then:
      rejected: true

  - name: resume a paused schedule
    given:
      - '@type': type.googleapis.com/trogonai.scheduler.schedules.v1.ScheduleCreated
        schedule_id: backup
        status:
          scheduled: {}
        schedule:
          every:
            every: 30s
        delivery:
          nats_message:
            subject: agent.run
        message:
          content:
            content_type: application/json
            data: e30=
      - '@type': type.googleapis.com/trogonai.scheduler.schedules.v1.SchedulePaused
        schedule_id: backup
    when:
      '@type': type.googleapis.com/trogonai.scheduler.schedules.v1.ResumeSchedule
      schedule_id: backup
    then:
      events:
        - '@type': type.googleapis.com/trogonai.scheduler.schedules.v1.ScheduleResumed
          schedule_id: backup

  - name: remove an existing schedule
    given:
      - '@type': type.googleapis.com/trogonai.scheduler.schedules.v1.ScheduleCreated
        schedule_id: backup
        status:
          scheduled: {}
        schedule:
          every:
            every: 30s
        delivery:
          nats_message:
            subject: agent.run
        message:
          content:
            content_type: application/json
            data: e30=
    when:
      '@type': type.googleapis.com/trogonai.scheduler.schedules.v1.RemoveSchedule
      schedule_id: backup
    then:
      events:
        - '@type': type.googleapis.com/trogonai.scheduler.schedules.v1.ScheduleRemoved
          schedule_id: backup

  - name: reject create after schedule removed
    given:
      - '@type': type.googleapis.com/trogonai.scheduler.schedules.v1.ScheduleCreated
        schedule_id: backup
        status:
          scheduled: {}
        schedule:
          every:
            every: 30s
        delivery:
          nats_message:
            subject: agent.run
        message:
          content:
            content_type: application/json
            data: e30=
      - '@type': type.googleapis.com/trogonai.scheduler.schedules.v1.ScheduleRemoved
        schedule_id: backup
    when:
      '@type': type.googleapis.com/trogonai.scheduler.schedules.v1.CreateSchedule
      schedule_id: backup
      status:
        scheduled: {}
      schedule:
        every:
          every: 30s
      delivery:
        nats_message:
          subject: agent.run
      message:
        content:
          content_type: application/json
          data: eyJraW5kIjoiaGVhcnRiZWF0In0=
    then:
      rejected: true

  - name: create, pause, then resume a schedule across one session
    steps:
      - when:
          '@type': type.googleapis.com/trogonai.scheduler.schedules.v1.CreateSchedule
          schedule_id: backup
          status:
            scheduled: {}
          schedule:
            every:
              every: 30s
          delivery:
            nats_message:
              subject: agent.run
          message:
            content:
              content_type: application/json
              data: eyJraW5kIjoiaGVhcnRiZWF0In0=
        then:
          events:
            - '@type': type.googleapis.com/trogonai.scheduler.schedules.v1.ScheduleCreated
              schedule_id: backup
              status:
                scheduled: {}
              schedule:
                every:
                  every: 30s
              delivery:
                nats_message:
                  subject: agent.run
              message:
                content:
                  content_type: application/json
                  data: eyJraW5kIjoiaGVhcnRiZWF0In0=
      - when:
          '@type': type.googleapis.com/trogonai.scheduler.schedules.v1.PauseSchedule
          schedule_id: backup
        then:
          events:
            - '@type': type.googleapis.com/trogonai.scheduler.schedules.v1.SchedulePaused
              schedule_id: backup
      - when:
          '@type': type.googleapis.com/trogonai.scheduler.schedules.v1.ResumeSchedule
          schedule_id: backup
        then:
          events:
            - '@type': type.googleapis.com/trogonai.scheduler.schedules.v1.ScheduleResumed
              schedule_id: backup
